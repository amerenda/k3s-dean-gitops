name: Auto-merge deploy PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    if: startsWith(github.head_ref, 'deploy/') || startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [[ "$TITLE" != deploy:* ]] && [[ "$TITLE" != release:* ]]; then
            echo "Unexpected PR title format: $TITLE"
            exit 1
          fi

      - name: Auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto
