kind: Application
metadata:
  name: infra-arc-runners
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # Install after controller and external-secrets
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: infra
  sources:
    - repoURL: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
      path: .
      targetRevision: 0.13.0
      helm:
        valueFiles:
          - $values/infra/arc-runners/values.yaml
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      path: infra/arc-runners
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: "apiextensions.k8s.io"
    kind: CustomResourceDefinition
    jsonPointers:
    - /spec/preserveUnknownFields
  - group: "external-secrets.io"
    kind: ExternalSecret
    name: controller-manager
    jsonPointers:
    - /spec/data/0/remoteRef/conversionStrategy
    - /spec/data/0/remoteRef/decodingStrategy
    - /spec/data/0/remoteRef/metadataPolicy
    - /spec/data/1/remoteRef/conversionStrategy
    - /spec/data/1/remoteRef/decodingStrategy
    - /spec/data/1/remoteRef/metadataPolicy
    - /spec/data/2/remoteRef/conversionStrategy
    - /spec/data/2/remoteRef/decodingStrategy
    - /spec/data/2/remoteRef/metadataPolicy
  - group: "actions.summerwind.dev"
    kind: HorizontalRunnerAutoscaler
    jsonPointers:
    - /spec/scaleUpTriggers
  - group: "actions.github.com"
    kind: AutoscalingRunnerSet
    jsonPointers:
    - /status/pendingEphemeralRunners
    - /status/currentRunners

