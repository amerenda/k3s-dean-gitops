spec:
  project: infra
  sources:
    - repoURL: ghcr.io/actions/actions-runner-controller-charts
      chart: gha-runner-scale-set-controller
      targetRevision: 0.13.0
      helm:
        valueFiles:
          - $values/infra/arc-controller/values.yaml
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      path: infra/arc-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-systems
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: "apiextensions.k8s.io"
    kind: CustomResourceDefinition
    jsonPointers:
    - /spec/preserveUnknownFields
  - group: "external-secrets.io"
    kind: ExternalSecret
    name: controller-manager
    jsonPointers:
    - /spec/data/0/remoteRef/conversionStrategy
    - /spec/data/0/remoteRef/decodingStrategy
    - /spec/data/0/remoteRef/metadataPolicy
    - /spec/data/1/remoteRef/conversionStrategy
    - /spec/data/1/remoteRef/decodingStrategy
    - /spec/data/1/remoteRef/metadataPolicy
    - /spec/data/2/remoteRef/conversionStrategy
    - /spec/data/2/remoteRef/decodingStrategy
    - /spec/data/2/remoteRef/metadataPolicy

