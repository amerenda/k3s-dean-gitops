---
# Infrastructure: Longhorn Storage
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-longhorn
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "3"  # Install after external-secrets (needs GCS credentials)
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: infra
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: 1.10.0
      helm:
        valueFiles:
          - $values/infra/longhorn/values.yaml
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      path: infra/longhorn/backups
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: "apiextensions.k8s.io"
    kind: CustomResourceDefinition
    name: engineimages.longhorn.io
    jsonPointers:
    - /spec/subresources
    - /spec/preserveUnknownFields
  - group: "apiextensions.k8s.io"
    kind: CustomResourceDefinition
    name: nodes.longhorn.io
    jsonPointers:
    - /spec/subresources
    - /spec/preserveUnknownFields
  - group: "apiextensions.k8s.io"
    kind: CustomResourceDefinition
    name: volumes.longhorn.io
    jsonPointers:
    - /spec/subresources
    - /spec/preserveUnknownFields
  - group: ""
    kind: Service
    name: longhorn-frontend
    jsonPointers:
    - /spec/ports/0/nodePort

---
# Infrastructure: External Secrets Operator
# Deploys External Secrets Operator using Helm chart with custom templates
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-external-secrets
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Install after cert-manager (needs TLS for Bitwarden)
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: infra
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 0.19.2
      helm:
        valueFiles:
          - $values/infra/external-secrets/values.yaml
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      path: infra/external-secrets/templates
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

