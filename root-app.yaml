# Infrastructure: ARC Runner Scale Set — wikimedia repo
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-arc-runners-wikimedia
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: infra
  sources:
    - repoURL: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
      path: .
      targetRevision: 0.13.0
      helm:
        valueFiles:
          - $values/infra/arc-runners-wikimedia/values.yaml
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      path: infra/arc-runners-wikimedia
  destination:
    server: https://kubernetes.default.svc
