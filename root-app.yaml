---
# OpenCode Tool Metrics — ServiceMonitor for murderbot:9110
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-opencode-metrics
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: infra
  source:
    repoURL: https://github.com/amerenda/k3s-dean-gitops.git
    targetRevision: main
    path: infra/opencode-metrics
  destination:
    server: https://kubernetes.default.svc
    namespace: opencode-metrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

