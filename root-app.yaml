---
# Application: Pi-hole DNS
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-pihole
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "5"  # Install after infrastructure (needs storage and secrets)
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: application
  sources:
    - repoURL: https://mojo2600.github.io/pihole-kubernetes/
      chart: pihole
      targetRevision: "2.34.0"
      helm:
        valueFiles:
          - $values/apps/pihole/values.yaml
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/amerenda/k3s-dean-gitops.git
      targetRevision: main
      path: apps/pihole
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # The mojo2600/pihole chart hardcodes kubernetes.io/arch: arm64 in nodeSelector.
  # We override it to {} in values.yaml but Helm's `with` block treats empty as falsy,
  # so the chart's default wins. Ignore the field so our manual patch (no nodeSelector)
  # is not overwritten by ArgoCD selfHeal.
  ignoreDifferences:
  - group: apps
    kind: Deployment
    name: app-pihole
    jsonPointers:
    - /spec/template/spec/nodeSelector

