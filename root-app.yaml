---
# Infrastructure: ArgoCD Config (resource exclusions override)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-argocd-config
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io/background
spec:
  project: infra
  source:
    repoURL: https://github.com/amerenda/k3s-dean-gitops.git
    targetRevision: main
    path: infra/argocd-config
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# ArgoCD App-of-Apps Root Application
