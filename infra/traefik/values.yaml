# Traefik Ingress Controller Configuration
# Optimized for k3s on Raspberry Pi

# Enable Traefik dashboard
dashboard:
  enabled: true
  service:
    type: LoadBalancer
    annotations:
      external-dns.alpha.kubernetes.io/hostname: traefik.amer.home
      external-dns.alpha.kubernetes.io/ttl: "1"

# Replica count for high availability — must run on every node that hosts
# Tailscale subnet router pods so externalTrafficPolicy: Local doesn't drop
# subnet-routed traffic on nodes without a local Traefik endpoint.
replicaCount: 2

# Resource limits for Raspberry Pi
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Enable metrics for monitoring
metrics:
  prometheus:
    enabled: true
    service:
      enabled: true
    serviceMonitor:
      enabled: true

# Chart v37 manages entrypoints via its own `ports` block and ignores most
# `--entrypoints.*` CLI flags. Configure redirection and access logs via
# chart-native values below, not globalArguments.
globalArguments:
  - "--global.checkNewVersion=false"
  - "--global.sendAnonymousUsage=false"

additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"

logs:
  general:
    level: INFO
  # Access log to stdout so `kubectl logs` shows request-level data for
  # debugging (403s from ipAllowList, route matches, etc).
  access:
    enabled: true

# `redirectTo` on the web entrypoint applies a global HTTP→HTTPS redirect
# so individual IngressRoutes don't need their own redirect middleware.
# (Chart v37 drops equivalent --entrypoints.web.http.redirections.* CLI flags.)
ports:
  web:
    redirectTo:
      port: websecure

providers:
  kubernetesIngress:
    ingressClass: "infra-traefik"
    allowExternalNameServices: true

# Service configuration
service:
  type: LoadBalancer
  # externalTrafficPolicy: Local preserves real source IPs through kube-proxy so
  # Traefik middleware (e.g. ipAllowList) sees the actual client IP rather than a
  # random node IP after SNAT. Required for Tailscale-based IP filtering.
  spec:
    externalTrafficPolicy: Local
  annotations:
    external-dns.alpha.kubernetes.io/hostname: traefik.amer.home
    external-dns.alpha.kubernetes.io/ttl: "3600"
    metallb.universe.tf/loadBalancerIPs: "10.100.20.203"

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0

# Node selector for Raspberry Pi nodes
nodeSelector:
  kubernetes.io/arch: arm64

# Tolerations for any taints
tolerations: []

# Affinity for better distribution
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - traefik
        topologyKey: kubernetes.io/hostname

# Security context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 65532

# Persistence disabled — all TLS is managed by cert-manager, not Traefik's built-in ACME.
# This also prevents Longhorn RWO PVC deadlocks during rolling updates.
persistence:
  enabled: false
