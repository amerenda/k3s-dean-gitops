---
# MetalLB IP Address Pools
# Load Balancer IP Pool for general applications
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: loadbalancer-pool
  namespace: metallb-system
spec:
  addresses:
  - 10.100.20.201-10.100.20.239
  autoAssign: true

---
# DNS IP Pool for DNS applications
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: dns-pool
  namespace: metallb-system
spec:
  addresses:
  - 10.100.20.241-10.100.20.251
  autoAssign: false  # Manual assignment for DNS services

---
# L2 Advertisement for Load Balancer Pool
# rpi5-0 excluded: bfdd crash-loops there (8k+ restarts), causing VIP flapping on any
# node that wins the L2 election. rpi5-1/rpi4-0/archlinux/murderbot are stable.
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: loadbalancer-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - loadbalancer-pool
  nodeSelectors:
  - matchExpressions:
    - key: kubernetes.io/hostname
      operator: NotIn
      values:
      - rpi5-0

---
# L2 Advertisement for DNS Pool
# rpi5-0 excluded: same bfdd crash-loop issue; BIND9 VIP outages = cluster-wide DNS failure.
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: dns-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - dns-pool
  nodeSelectors:
  - matchExpressions:
    - key: kubernetes.io/hostname
      operator: NotIn
      values:
      - rpi5-0
