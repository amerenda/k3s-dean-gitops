---
# Static DNS record for agent-kb (Mac Mini) — managed by external-dns via DNSEndpoint CRD.
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: agent-kb-static
  namespace: default
spec:
  endpoints:
    - dnsName: agent-kb.amer.home
      recordType: A
      targets:
        - "10.100.20.18"
      recordTTL: 300
