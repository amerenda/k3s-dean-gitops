---
# ArgoCD ConfigMap — overrides default resource exclusions.
# By default ArgoCD v3 excludes both Endpoints and EndpointSlice.
# We remove EndpointSlice from exclusions so that manually-created
# EndpointSlice resources (e.g., moltbook → murderbot) can be managed via gitops.
# Endpoints remain excluded (they are auto-generated by kube-controller-manager
# for every Service with a selector and should not be tracked by ArgoCD).
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: default
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  resource.exclusions: |
    - apiGroups:
        - ""
      kinds:
        - Endpoints
      clusters:
        - "*"
    - apiGroups:
        - "apiextensions.crossplane.io"
      kinds:
        - ProviderConfigUsage
      clusters:
        - "*"
