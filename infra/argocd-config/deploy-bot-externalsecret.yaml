apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-deploy-bot
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: argocd-deploy-bot
    creationPolicy: Owner
  data:
  # ArgoCD ApplicationSet expects keys: appID, appInstallationID, appPrivateKey
  - secretKey: appID
    remoteRef:
      key: github-app-deploy-bot-id
      property: github_app_id
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: appInstallationID
    remoteRef:
      key: github-app-deploy-bot-installation-id
      property: github_app_installation_id
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: appPrivateKey
    remoteRef:
      key: github-app-deploy-bot-private-key
      property: github_app_private_key
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
