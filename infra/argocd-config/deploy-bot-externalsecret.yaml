apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-deploy-bot
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: argocd-deploy-bot
    creationPolicy: Owner
  data:
  # ArgoCD ApplicationSet PR generator expects these exact key names
  - secretKey: githubAppID
    remoteRef:
      key: github-app-ci-bot-id
      property: github_app_id
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: githubAppInstallationID
    remoteRef:
      key: github-app-ci-bot-installation-id
      property: github_app_installation_id
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: githubAppPrivateKey
    remoteRef:
      key: github-app-ci-bot-private-key
      property: github_app_private_key
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
