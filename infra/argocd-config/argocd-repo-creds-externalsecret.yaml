apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-creds-github
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: cred-k3s-dean-gitops
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: "git"
        url: "https://github.com/amerenda"
        githubAppID: "{{ .githubAppID }}"
        githubAppInstallationID: "{{ .githubAppInstallationID }}"
        githubAppPrivateKey: "{{ .githubAppPrivateKey }}"
  data:
  - secretKey: githubAppID
    remoteRef:
      key: github-app-ci-bot-id
      property: github_app_id
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: githubAppInstallationID
    remoteRef:
      key: github-app-ci-bot-installation-id
      property: github_app_installation_id
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: githubAppPrivateKey
    remoteRef:
      key: github-app-ci-bot-private-key
      property: github_app_private_key
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
