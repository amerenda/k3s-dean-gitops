apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: controller-manager
  namespace: arc-runners-tailscale-acl
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: controller-manager
    creationPolicy: Owner
  data:
  - secretKey: github_app_id
    remoteRef:
      key: github-app-arc-id
      property: github_app_id
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: github_app_installation_id
    remoteRef:
      key: github-app-arc-installation-id
      property: github_app_installation_id
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
  - secretKey: github_app_private_key
    remoteRef:
      key: github-app-arc-private-key
      property: github_app_private_key
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: runner-ci-credentials
  namespace: arc-runners-tailscale-acl
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: runner-ci-credentials
    creationPolicy: Owner
  data:
  - secretKey: TS_API_KEY
    remoteRef:
      key: k3s-dean-tailscale-api-key
      property: password
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
