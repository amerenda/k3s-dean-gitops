apiVersion: batch/v1
kind: CronJob
metadata:
  name: arc-runner-work-cleanup
  namespace: arc-runners
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - murderbot
          tolerations:
            - key: node.kubernetes.io/disk-pressure
              operator: Exists
              effect: NoSchedule
          containers:
            - name: cleanup
              image: busybox
              command:
                - sh
                - -c
                - |
                  find /work -mindepth 1 -maxdepth 1 -type d -mmin +60 -exec rm -rf {} \;
                  echo "Cleanup complete."
              volumeMounts:
                - name: work
                  mountPath: /work
          volumes:
            - name: work
              hostPath:
                path: /mnt/storage/k3s-runner-work
                type: Directory
