# ARC runner scale set for amerenda/llm-agents
# Kubernetes mode — Kaniko builds images, no Docker daemon needed
githubConfigUrl: "https://github.com/amerenda/llm-agents"
runnerScaleSetName: arc-runner-set
githubConfigSecret: controller-manager
controllerServiceAccount:
  name: infra-arc-controller
  namespace: arc-systems
minRunners: 0
maxRunners: 3
containerMode:
  type: kubernetes
  kubernetesModeWorkVolumeClaim:
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 1Gi
template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKERHUB_USERNAME
            value: "amerenda"
          - name: DOCKERHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: DOCKERHUB_TOKEN
          - name: GITOPS_PAT
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: GITOPS_PAT
namespaceOverride: arc-runners-llm-agents
