# ARC runner scale set for amerenda/llm-agents
# Host Docker socket — native x86 builds on murderbot with layer cache
githubConfigUrl: "https://github.com/amerenda/llm-agents"
runnerScaleSetName: arc-runner-set
githubConfigSecret: controller-manager
controllerServiceAccount:
  name: infra-arc-controller
  namespace: arc-systems
minRunners: 0
maxRunners: 3
template:
  spec:
    nodeSelector:
      kubernetes.io/hostname: murderbot
    securityContext:
      supplementalGroups: [989]
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: "unix:///var/run/docker.sock"
          - name: DOCKERHUB_USERNAME
            value: "amerenda"
          - name: DOCKERHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: DOCKERHUB_TOKEN
          - name: GITOPS_PAT
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: GITOPS_PAT
        volumeMounts:
          - name: docker-sock
            mountPath: /var/run/docker.sock
          - name: work
            mountPath: /home/runner/_work
          - name: docker-build-cache
            mountPath: /mnt/storage/docker-build-cache
    volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
      - name: work
        emptyDir: {}
      - name: docker-build-cache
        hostPath:
          path: /mnt/storage/docker-build-cache
          type: Directory
namespaceOverride: arc-runners-llm-agents
