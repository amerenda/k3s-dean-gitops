apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        kubernetes.io/hostname: murderbot
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.0
          args:
            - --mig-strategy=none
            - --fail-on-init-error=false
            - --device-discovery-strategy=nvml
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: void
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            # Mount ONLY the nvml library — not the whole lib dir (glibc conflict)
            - name: nvidia-ml-lib
              mountPath: /usr/local/nvidia/lib64/libnvidia-ml.so.1
              readOnly: true
            - name: nvidia-ml-versioned
              mountPath: /usr/local/nvidia/lib64/libnvidia-ml.so.595.58.03
              readOnly: true
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: nvidia-ml-lib
          hostPath:
            path: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1
            type: File
        - name: nvidia-ml-versioned
          hostPath:
            path: /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.595.58.03
            type: File
