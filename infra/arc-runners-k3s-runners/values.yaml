# ARC runner scale set for amerenda/k3s-runners
# Host Docker socket — amd64 builds on murderbot (primary) or archlinux (overflow / when murderbot is down)
githubConfigUrl: "https://github.com/amerenda/k3s-runners"
runnerScaleSetName: arc-runner-k3s-runners
githubConfigSecret: controller-manager
controllerServiceAccount:
  name: infra-arc-controller
  namespace: arc-systems
minRunners: 0
maxRunners: 3
template:
  spec:
    tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - murderbot
                    - archlinux
    securityContext:
      supplementalGroups: [989, 952, 968]
    initContainers:
      - name: init-work-dir
        image: busybox
        command: ['sh', '-c', 'chmod 777 /home/runner/_work']
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: "unix:///var/run/docker.sock"
          - name: DOCKERHUB_USERNAME
            value: "amerenda"
          - name: DOCKERHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: DOCKERHUB_TOKEN
          - name: GITOPS_PAT
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: GITOPS_PAT
        volumeMounts:
          - name: docker-sock
            mountPath: /var/run/docker.sock
          - name: work
            mountPath: /home/runner/_work
    volumes:
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
      - name: work
        hostPath:
          path: /mnt/storage/k3s-runner-work
          type: DirectoryOrCreate
namespaceOverride: arc-runners
