---
# Standalone etcd monitoring — NOT managed by Helm.
# The Helm kubeEtcd service has no selector, so k8s endpoint controller
# keeps wiping the endpoints. We manage our own service+endpoints+ServiceMonitor.
apiVersion: v1
kind: Service
metadata:
  name: k3s-etcd-metrics
  namespace: kube-system
  labels:
    app: k3s-etcd
spec:
  clusterIP: None
  ports:
    - name: http-metrics
      port: 2381
      targetPort: 2381
  type: ClusterIP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: k3s-etcd-metrics
  namespace: kube-system
  labels:
    app: k3s-etcd
subsets:
  - addresses:
      - ip: "10.100.20.10"
        nodeName: rpi5-0
      - ip: "10.100.20.11"
        nodeName: rpi5-1
      - ip: "10.100.20.12"
        nodeName: rpi4-0
    ports:
      - name: http-metrics
        port: 2381
        protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k3s-etcd
  namespace: kube-system
  labels:
    app: k3s-etcd
spec:
  selector:
    matchLabels:
      app: k3s-etcd
  namespaceSelector:
    matchNames:
      - kube-system
  endpoints:
    - port: http-metrics
      interval: 30s
