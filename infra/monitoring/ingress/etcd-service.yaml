---
# Manual Endpoints for the Helm-managed kube-etcd service.
# K3s embeds etcd — no pods with matching labels exist, so
# the headless service has empty endpoints. We manually point
# it at the 3 controller nodes' etcd metrics port (2381).
#
# Must be v1 Endpoints (not EndpointSlice) because the Prometheus
# Operator uses `role: endpoints` for service discovery.
apiVersion: v1
kind: Endpoints
metadata:
  name: infra-monitoring-kube-prom-kube-etcd
  namespace: kube-system
  labels:
    app: kube-prometheus-stack-kube-etcd
    release: infra-monitoring
subsets:
  - addresses:
      - ip: "10.100.20.10"
        nodeName: rpi5-0
      - ip: "10.100.20.11"
        nodeName: rpi5-1
      - ip: "10.100.20.12"
        nodeName: rpi4-0
    ports:
      - name: http-metrics
        port: 2381
        protocol: TCP
