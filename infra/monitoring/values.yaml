# kube-prometheus-stack Helm Values
# Monitoring stack for K3s on Raspberry Pi
#
# Prometheus runs in Agent mode and forwards samples to mac-mini.

# --- AlertManager: disabled ---
alertmanager:
  enabled: false

# --- Prometheus ---
prometheus:
  agentMode: true
  prometheusSpec:
    # Use EndpointSlice for target discovery (Endpoints v1 deprecated in k8s 1.33+).
    serviceDiscoveryRole: EndpointSlice
    externalLabels:
      cluster: k3s-dean
      role: edge-agent
    walCompression: true
    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        cpu: "1"
        memory: 8Gi
    remoteWrite:
      - url: "http://10.100.20.18:9090/api/v1/write"
        queueConfig:
          capacity: 10000
          maxShards: 30
          minShards: 1
          maxSamplesPerSend: 5000
          batchSendDeadline: 5s
          minBackoff: 100ms
          maxBackoff: 10s
    # Scrape external targets (outside k8s)
    additionalScrapeConfigs:
      - job_name: llm-agent
        scheme: https
        tls_config:
          insecure_skip_verify: true
        static_configs:
          - targets: ["10.100.20.18:8090"]
            labels:
              node: mac-mini-m4
          - targets: ["10.100.20.19:8090"]
            labels:
              node: murderbot
          - targets: ["10.100.20.25:8090"]
            labels:
              node: archlinux
      - job_name: llm-metrics
        static_configs:
          - targets: ["10.100.20.19:8088"]
            labels:
              node: murderbot
              source: llamacpp
      - job_name: gpu-metrics
        static_configs:
          - targets: ["10.100.20.19:9835"]
            labels:
              node: murderbot
              source: nvidia_exporter
    # ServiceMonitor selector: watch all namespaces, match release label
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# --- Grafana ---
grafana:
  enabled: false

# --- Prometheus Operator ---
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- node-exporter ---
prometheus-node-exporter:
  tolerations:
    - key: "longhorn"
      operator: "Exists"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# --- kube-state-metrics ---
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# --- Disabled K3s-inaccessible components ---
# K3s binds these to localhost; Prometheus cannot scrape them from the cluster.
kubeProxy:
  enabled: false
kubeEtcd:
  # Disabled — Helm's headless service has no selector so endpoints keep
  # getting wiped. We manage our own service+endpoints+ServiceMonitor in
  # infra/monitoring/ingress/etcd-service.yaml instead.
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
# Kubelet metrics (port 10250) — accessible from pods with bearer token auth on K3s.
kubelet:
  enabled: true
  serviceMonitor:
    enabled: true
    # cAdvisor metrics for container CPU/memory/network/filesystem
    cAdvisor: true
    # Probes metrics
    probes: true
    # Resource metrics — disabled; K3s doesn't serve /metrics/resource/v1alpha1
    resource: false
defaultRules:
  rules:
    kubelet: true
