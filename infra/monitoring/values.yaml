# kube-prometheus-stack Helm Values
# Monitoring stack for K3s on Raspberry Pi
#
# Prometheus runs in full mode with local rule evaluation and forwards samples to mac-mini.

# --- AlertManager: watchdog alerts (no notification channels yet) ---
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 5Gi

# --- Prometheus ---
prometheus:
  prometheusSpec:
    # Use EndpointSlice for target discovery (Endpoints v1 deprecated in k8s 1.33+).
    serviceDiscoveryRole: EndpointSlice
    externalLabels:
      cluster: k3s-dean
      role: edge-prometheus
    walCompression: true
    retention: 2h
    # Local TSDB with limited storage — all data is remote-written to mac-mini.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 300m
        memory: 768Mi
      limits:
        cpu: "1"
        memory: 2Gi
    remoteWrite:
      - url: "http://10.100.20.18:9090/api/v1/write"
        queueConfig:
          capacity: 10000
          maxShards: 30
          minShards: 1
          maxSamplesPerSend: 5000
          batchSendDeadline: 5s
          minBackoff: 100ms
          maxBackoff: 10s
    # Scrape external targets (outside k8s)
    additionalScrapeConfigs:
      - job_name: llm-agent
        scheme: https
        tls_config:
          insecure_skip_verify: true
        static_configs:
          - targets: ["10.100.20.18:8090"]
            labels:
              node: mac-mini-m4
          - targets: ["10.100.20.19:8090"]
            labels:
              node: murderbot
          - targets: ["10.100.20.25:8090"]
            labels:
              node: archlinux
      - job_name: llm-metrics
        static_configs:
          - targets: ["10.100.20.19:8088"]
            labels:
              node: murderbot
              source: llamacpp
      - job_name: gpu-metrics
        static_configs:
          - targets: ["10.100.20.19:9835"]
            labels:
              node: murderbot
              source: nvidia_exporter

      # Cross-stack heartbeat — mac-mini Prometheus health probe
      - job_name: mac-mini-prometheus-heartbeat
        scheme: http
        metrics_path: /metrics
        scrape_interval: 15s
        static_configs:
          - targets: ["10.100.20.18:9090"]
            labels:
              cluster: mac-mini-m4
    # Only load rules from our heartbeat PrometheusRule (no kube-prometheus default rules)
    ruleSelector:
      matchLabels:
        app.kubernetes.io/component: heartbeat
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# --- Grafana ---
grafana:
  enabled: false

# --- Prometheus Operator ---
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- node-exporter ---
prometheus-node-exporter:
  tolerations:
    - key: "longhorn"
      operator: "Exists"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# --- kube-state-metrics ---
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# --- Disabled K3s-inaccessible components ---
# K3s binds these to localhost; Prometheus cannot scrape them from the cluster.
kubeProxy:
  enabled: false
kubeEtcd:
  # Disabled — Helm's headless service has no selector so endpoints keep
  # getting wiped. We manage our own service+endpoints+ServiceMonitor in
  # infra/monitoring/ingress/etcd-service.yaml instead.
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
# Kubelet metrics (port 10250) — accessible from pods with bearer token auth on K3s.
kubelet:
  enabled: true
  serviceMonitor:
    enabled: true
    # cAdvisor metrics for container CPU/memory/network/filesystem
    cAdvisor: true
    # Probes metrics
    probes: true
    # Resource metrics — disabled; K3s doesn't serve /metrics/resource/v1alpha1
    resource: false
defaultRules:
  enabled: false
