# kube-prometheus-stack Helm Values
# Monitoring stack for K3s on Raspberry Pi

# --- AlertManager: disabled ---
alertmanager:
  enabled: false

# --- Prometheus ---
prometheus:
  prometheusSpec:
    # Pin to storage nodes — add longhorn-storage=true to any future storage node
    # and Prometheus will be eligible to schedule there too.
    nodeSelector:
      longhorn-storage: "true"
    retention: 90d
    retentionSize: 80GB
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 120Gi
    # Generous startup probe: 1448 WAL segments caused CrashLoopBackOff
    # with the default probe. Allow up to 15 minutes for WAL replay.
    startupProbe:
      failureThreshold: 60
      periodSeconds: 15
    # Scrape external targets (outside k8s)
    additionalScrapeConfigs:
      - job_name: llm-agent
        scheme: https
        tls_config:
          insecure_skip_verify: true
        static_configs:
          - targets: ["10.100.20.19:8090"]
            labels:
              node: murderbot
          - targets: ["10.100.20.25:8090"]
            labels:
              node: archlinux
    # ServiceMonitor selector: watch all namespaces, match release label
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# --- Grafana (ClusterIP; exposed via Ingress with TLS below) ---
grafana:
  # Pin to storage nodes alongside Prometheus (shares a Longhorn PVC)
  nodeSelector:
    longhorn-storage: "true"
  # Required for browser login when accessed via Ingress (cookies/redirects)
  grafana.ini:
    server:
      root_url: https://grafana.amer.dev
      domain: grafana.amer.dev
    users:
      # Redirect to home dashboard on login
      home_page: /d/home/home
  # Explicit Prometheus URL so Grafana can reach Prometheus (chart default can be wrong)
  sidecar:
    datasources:
      url: "http://infra-monitoring-kube-prom-prometheus:9090"
  # Recreate strategy so only one pod uses the RWO PVC at a time (avoids Multi-Attach)
  deploymentStrategy:
    type: Recreate
  service:
    type: ClusterIP
  persistence:
    enabled: true
    storageClassName: longhorn
    accessModes: ["ReadWriteOnce"]
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: America/New_York

# --- Prometheus Operator ---
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- node-exporter ---
prometheus-node-exporter:
  tolerations:
    - key: "longhorn"
      operator: "Exists"
      effect: "NoSchedule"
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# --- kube-state-metrics ---
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# --- Disabled K3s-inaccessible components ---
# K3s binds these to localhost; Prometheus cannot scrape them from the cluster.
kubeProxy:
  enabled: false
kubeEtcd:
  # Disabled — Helm's headless service has no selector so endpoints keep
  # getting wiped. We manage our own service+endpoints+ServiceMonitor in
  # infra/monitoring/ingress/etcd-service.yaml instead.
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
# Kubelet metrics (port 10250) — accessible from pods with bearer token auth on K3s.
kubelet:
  enabled: true
  serviceMonitor:
    enabled: true
    # cAdvisor metrics for container CPU/memory/network/filesystem
    cAdvisor: true
    # Probes metrics
    probes: true
    # Resource metrics — disabled; K3s doesn't serve /metrics/resource/v1alpha1
    resource: false
defaultRules:
  rules:
    kubelet: true
