# kube-prometheus-stack Helm Values
# Monitoring stack for K3s on Raspberry Pi
#
# Prometheus runs in full mode with local rule evaluation and forwards samples to mac-mini.

# --- AlertManager: watchdog alerts (no notification channels yet) ---
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 5Gi

# --- Prometheus ---
prometheus:
  prometheusSpec:
    # Use EndpointSlice for target discovery (Endpoints v1 deprecated in k8s 1.33+).
    serviceDiscoveryRole: EndpointSlice
    externalLabels:
      cluster: k3s-dean
      role: edge-prometheus
    walCompression: true
    retention: 2h
    # Local TSDB with limited storage — all data is remote-written to mac-mini.
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          resources:
            requests:
              storage: 2Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - murderbot
                    - archlinux
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    remoteWrite:
      - url: "http://10.100.20.18:9090/api/v1/write"
        queueConfig:
          capacity: 10000
          maxShards: 30
          minShards: 1
          maxSamplesPerSend: 5000
          batchSendDeadline: 5s
          minBackoff: 100ms
          maxBackoff: 10s
    # Scrape external targets (outside k8s)
    additionalScrapeConfigs:
      # Cross-stack heartbeat — mac-mini Prometheus health probe
      - job_name: mac-mini-prometheus-heartbeat
        scheme: http
        metrics_path: /metrics
        scrape_interval: 15s
        static_configs:
          - targets: ["10.100.20.18:9090"]
            labels:
              cluster: mac-mini-m4
    # Only load rules from our heartbeat PrometheusRule (no kube-prometheus default rules)
    ruleSelector:
      matchLabels:
        app.kubernetes.io/component: heartbeat
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# --- Grafana ---
grafana:
  # Disabled — we forward all metrics to mac-mini's Grafana for full dashboards.
  enabled: false

defaultRules:
  create: true
  rules:
    alertmanager: false
    etcd: false
    configReloaders: false
    general: false
    k8sContainerCpuUsageSecondsTotal: false
    k8sContainerMemoryCache: false
    k8sContainerMemoryRss: false
    k8sContainerMemorySwap: false
    k8sContainerResource: false
    k8sContainerMemoryWorkingSetBytes: false
    k8sPodOwner: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverHistogram: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubelet: false
    kubeProxy: false
    kubePrometheusGeneral: false
    kubePrometheusNodeRecording: false
    kubernetesApps: false
    kubernetesResources: false
    kubernetesStorage: false
    kubernetesSystem: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeStateMetrics: false
    network: false
    node: false
    nodeExporterAlerting: false
    nodeExporterRecording: false
    prometheus: false
    prometheusOperator: false
