apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-app-llm-manager
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Apps
data:
  app-llm-manager.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "row",
          "title": "Backend Overview",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 10
        },
        {
          "type": "stat",
          "title": "Registered Apps",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 1},
          "id": 12,
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "llm_backend_registered_apps",
              "legendFormat": "apps",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Moltbook Agents Running",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 1},
          "id": 13,
          "fieldConfig": {
            "defaults": {
              "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}]}
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "area"},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "moltbook_backend_agents_running",
              "legendFormat": "agents",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "Request Traffic",
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
          "id": 20
        },
        {
          "type": "timeseries",
          "title": "Backend API Request Rate (req/s)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
          "id": 22,
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never", "spanNulls": true}
            }
          },
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(llm_backend_api_requests_total[5m])",
              "legendFormat": "{{method}} {{endpoint}} {{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Backend API Errors",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
          "id": 24,
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never", "spanNulls": true}
            }
          },
          "options": {
            "legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(llm_backend_api_requests_total{status=~\"5..\"}[5m])",
              "legendFormat": "{{method}} {{endpoint}} {{status}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(llm_backend_api_requests_total{status=~\"4..\"}[5m])",
              "legendFormat": "{{method}} {{endpoint}} {{status}}",
              "refId": "B"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Moltbook Agents Running Over Time",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 14},
          "id": 36,
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "custom": {"lineWidth": 2, "fillOpacity": 10, "showPoints": "never", "spanNulls": true}
            }
          },
          "options": {
            "legend": {"calcs": ["mean", "lastNotNull"], "displayMode": "table", "placement": "bottom"},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "moltbook_backend_agents_running",
              "legendFormat": "agents",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["llm", "ai"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "LLM Manager",
      "uid": "llm-manager",
      "version": 2
    }
