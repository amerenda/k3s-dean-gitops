apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-speedtest
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'Apps'
data:
  speedtest.json: |
    {
      "title": "Internet Speed Tests",
      "uid": "speedtest",
      "schemaVersion": 38,
      "version": 1,
      "tags": ["network", "speedtest"],
      "timezone": "browser",
      "graphTooltip": 1,
      "time": { "from": "now-24h", "to": "now" },
      "refresh": "1h",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Latest Download",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "Mbits",
              "decimals": 1,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "green", "value": 500 }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "last_over_time(speedtest_download_bits_per_second[2h]) / 1e6",
              "legendFormat": "Download",
              "refId": "A",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Latest Upload",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "Mbits",
              "decimals": 1,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "green", "value": 100 }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "last_over_time(speedtest_upload_bits_per_second[2h]) / 1e6",
              "legendFormat": "Upload",
              "refId": "A",
              "instant": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Latest Ping",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 1,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 30 },
                  { "color": "red", "value": 60 }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "last_over_time(speedtest_ping_latency_milliseconds[2h])",
              "legendFormat": "Ping",
              "refId": "A",
              "instant": true
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Latest Jitter",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 1,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 25 }
                ]
              }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "textMode": "auto", "colorMode": "background" },
          "targets": [
            {
              "expr": "last_over_time(speedtest_jitter_latency_milliseconds[2h])",
              "legendFormat": "Jitter",
              "refId": "A",
              "instant": true
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Download Speed",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 4 },
          "fieldConfig": {
            "defaults": {
              "unit": "Mbits",
              "decimals": 1,
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": true }
            }
          },
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "hidden" } },
          "targets": [
            {
              "expr": "speedtest_download_bits_per_second / 1e6",
              "legendFormat": "Download (Mbps)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Upload Speed",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 4 },
          "fieldConfig": {
            "defaults": {
              "unit": "Mbits",
              "decimals": 1,
              "color": { "mode": "fixed", "fixedColor": "green" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": true }
            }
          },
          "options": { "tooltip": { "mode": "single" }, "legend": { "displayMode": "hidden" } },
          "targets": [
            {
              "expr": "speedtest_upload_bits_per_second / 1e6",
              "legendFormat": "Upload (Mbps)",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Latency & Jitter",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 13 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 1,
              "custom": { "lineWidth": 2, "fillOpacity": 5, "spanNulls": true }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Jitter (ms)" },
                "properties": [{ "id": "custom.lineStyle", "value": { "dash": [10, 10], "fill": "dash" } }]
              }
            ]
          },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "speedtest_ping_latency_milliseconds",
              "legendFormat": "Ping (ms)",
              "refId": "A"
            },
            {
              "expr": "speedtest_jitter_latency_milliseconds",
              "legendFormat": "Jitter (ms)",
              "refId": "B"
            }
          ]
        }
      ]
    }
