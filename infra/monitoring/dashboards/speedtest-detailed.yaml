apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-speedtest-detailed
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
  annotations:
    grafana_folder: 'Apps'
data:
  speedtest-detailed.json: |
    {
      "title": "Speedtest Detailed",
      "uid": "speedtest-detailed",
      "description": "Detailed speedtest metrics (adapted from grafana.com #14336)",
      "schemaVersion": 38,
      "version": 1,
      "tags": ["network", "speedtest"],
      "timezone": "browser",
      "graphTooltip": 2,
      "time": { "from": "now-24h", "to": "now" },
      "refresh": "1h",
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Throughput",
          "gridPos": { "h": 10, "w": 16, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "scheme",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Download" },
                "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Upload" },
                "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }]
              }
            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true,
              "calcs": ["min", "max", "mean", "lastNotNull"]
            },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "last_over_time(speedtest_download_bits_per_second[75m])",
              "legendFormat": "Download",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "last_over_time(speedtest_upload_bits_per_second[75m])",
              "legendFormat": "Upload",
              "refId": "B"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Download (7d)",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "color": { "fixedColor": "green", "mode": "fixed" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "timeFrom": "7d",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(max_over_time(speedtest_download_bits_per_second[1w:5m]))",
              "legendFormat": "Best",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "min(min_over_time(speedtest_download_bits_per_second[1w:5m]))",
              "legendFormat": "Worst",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "avg(avg_over_time(speedtest_download_bits_per_second[1w:5m]))",
              "legendFormat": "Avg",
              "refId": "C"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Upload (7d)",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bps",
              "color": { "fixedColor": "yellow", "mode": "fixed" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "timeFrom": "7d",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(max_over_time(speedtest_upload_bits_per_second[1w:5m]))",
              "legendFormat": "Best",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "min(min_over_time(speedtest_upload_bits_per_second[1w:5m]))",
              "legendFormat": "Worst",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "avg(avg_over_time(speedtest_upload_bits_per_second[1w:5m]))",
              "legendFormat": "Avg",
              "refId": "C"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Latency (7d)",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "color": { "fixedColor": "blue", "mode": "fixed" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "timeFrom": "7d",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "min(min_over_time(speedtest_ping_latency_milliseconds[1w:5m]))",
              "legendFormat": "Best",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(max_over_time(speedtest_ping_latency_milliseconds[1w:5m]))",
              "legendFormat": "Worst",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "avg(avg_over_time(speedtest_ping_latency_milliseconds[1w:5m]))",
              "legendFormat": "Avg",
              "refId": "C"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Latency",
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Ping" },
                "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Jitter" },
                "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }]
              }
            ]
          },
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true,
              "calcs": ["min", "max", "mean", "lastNotNull"]
            },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "last_over_time(speedtest_ping_latency_milliseconds[75m])",
              "legendFormat": "Ping",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "last_over_time(speedtest_jitter_latency_milliseconds[75m])",
              "legendFormat": "Jitter",
              "refId": "B"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Jitter",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 1,
              "color": { "fixedColor": "orange", "mode": "fixed" },
              "custom": {
                "axisCenteredZero": false,
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "scheme",
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 4,
                "showPoints": "auto",
                "spanNulls": true,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "hidden", "showLegend": false },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "last_over_time(speedtest_jitter_latency_milliseconds[75m])",
              "legendFormat": "Jitter",
              "refId": "A"
            }
          ]
        }
      ]
    }
