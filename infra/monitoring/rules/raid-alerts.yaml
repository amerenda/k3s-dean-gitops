apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: raid-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/component: heartbeat
spec:
  groups:
    - name: raid-alerts
      rules:
        # RAID array has degraded — any disk failed or removed. Losing a second drive means data loss.
        - alert: RaidArrayDegraded
          expr: node_md_degraded{device="md0"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "RAID array md0 has degraded"
            description: |
              The RAID-5 array (md0) is in a degraded state. If another drive fails, data loss will occur. 
              Replace the failed drive immediately.

        # Array is recovering (after rebuild/replacement) — warning so you know it's happening.
        - alert: RaidRecovering
          expr: node_md_state{device="md0",state="recovering"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "RAID array md0 is recovering"
            description: |
              The RAID-5 array (md0) is actively rebuilding/recovering. Performance will be degraded during recovery.

        # Array has spare drives — a drive was removed or replaced with an unformatted spare.
        - alert: RaidSpareDisksPresent
          expr: sum(node_md_disks{device="md0",state="spare"}) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Spares detected in md0 RAID array"
            description: |
              The md0 RAID-5 array has {{ $value }} spare disk(s). This could indicate a drive was removed or is being replaced.

        # Array went inactive — catastrophic failure, all data inaccessible.
        - alert: RaidInactive
          expr: node_md_state{device="md0",state="inactive"} == 1
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "RAID array md0 is INACTIVE"
            description: |
              The RAID-5 array (md0) has stopped completely. All data on /mnt/storage may be inaccessible. 
              Emergency action required.

        # Array resyncing — background sync after re-add or rescan, not failure-related.
        - alert: RaidResyncing
          expr: node_md_state{device="md0",state="resync"} == 1
          for: 5m
          labels:
            severity: info
          annotations:
            summary: "RAID array md0 is resyncing"
            description: |
              The RAID-5 array (md0) is performing a background resync.

        # Array running a check/scrub — informational, no action needed.
        - alert: RaidChecking
          expr: node_md_state{device="md0",state="check"} == 1
          for: 5m
          labels:
            severity: info
          annotations:
            summary: "RAID array md0 is checking"
            description: |
              The RAID-5 array (md0) is running a consistency check/scrub.

