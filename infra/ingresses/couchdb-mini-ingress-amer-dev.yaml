---
# Service + Endpoints for CouchDB running on Mac Mini (external to k3s)
# Backs the Obsidian "Self-hosted LiveSync" plugin — no vault state on k3s.
apiVersion: v1
kind: Service
metadata:
  name: couchdb-mini-external
  namespace: default
spec:
  ports:
    - port: 5984
      targetPort: 5984
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: couchdb-mini-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: couchdb-mini-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.18  # Mac Mini LAN IP
    conditions:
        ready: true
ports:
  - name: ""
    port: 5984
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: couchdb-mini-ingress-amer-dev
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: couchdb.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - couchdb.amer.dev
      secretName: couchdb-amer-dev-tls
  rules:
    - host: couchdb.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: couchdb-mini-external
                port:
                  number: 5984
