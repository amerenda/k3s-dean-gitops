---
# Service + Endpoints for Home Assistant running on Mac Mini (external to k3s)
apiVersion: v1
kind: Service
metadata:
  name: ha-mini-external
  namespace: default
spec:
  ports:
    - port: 8123
      targetPort: 8123
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ha-mini-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: ha-mini-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.18  # Mac Mini LAN IP
    conditions:
        ready: true
ports:
  - name: ""
    port: 8123
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ha-mini-ingress-amer-dev
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: ha.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - ha.amer.dev
      secretName: ha-amer-dev-tls
  rules:
    - host: ha.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ha-mini-external
                port:
                  number: 8123
