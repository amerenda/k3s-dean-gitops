---
# Service + EndpointSlice for AlertManager running on Mac Mini (external to k3s)
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-mini-external
  namespace: default
spec:
  ports:
    - port: 9093
      targetPort: 9093
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: alertmanager-mini-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: alertmanager-mini-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.18  # Mac Mini LAN IP
    conditions:
        ready: true
ports:
  - name: ""
    port: 9093
    protocol: TCP
---
# Ingress — alertmanager.amer.dev + alerts.amer.dev alias, same cert, same backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager-mini-ingress-amer-dev
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: alertmanager.amer.dev,alerts.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - alertmanager.amer.dev
        - alerts.amer.dev
      secretName: alertmanager-amer-dev-tls
  rules:
    - host: alertmanager.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alertmanager-mini-external
                port:
                  number: 9093
    - host: alerts.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alertmanager-mini-external
                port:
                  number: 9093
