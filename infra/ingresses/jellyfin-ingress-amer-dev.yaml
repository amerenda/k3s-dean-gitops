---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: prowlarr-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: prowlarr-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.19
