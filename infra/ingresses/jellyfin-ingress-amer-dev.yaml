---
# Media stack ingress for services running on murderbot (10.100.20.19, external to k3s).
# All hosts are limited to private/Tailscale ranges via the media-allowlist middleware.
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-external
  namespace: default
spec:
  ports:
    - port: 8096
      targetPort: 8096
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: jellyfin-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: jellyfin-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.19
    conditions:
      ready: true
ports:
  - name: ""
    port: 8096
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr-external
  namespace: default
spec:
  ports:
    - port: 8989
      targetPort: 8989
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: sonarr-external-1
  namespace: default
  labels:
