---
# Media stack ingress for services running on murderbot (external to k3s).
# All hosts are limited to Tailscale clients via middleware allowlist.
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-external
  namespace: default
spec:
  ports:
    - port: 8096
      targetPort: 8096
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: jellyfin-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: jellyfin-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.25
    conditions:
      ready: true
ports:
  - name: ""
    port: 8096
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr-external
  namespace: default
spec:
  ports:
    - port: 8989
      targetPort: 8989
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: sonarr-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: sonarr-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.25
    conditions:
      ready: true
ports:
  - name: ""
    port: 8989
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: radarr-external
  namespace: default
spec:
  ports:
    - port: 7878
      targetPort: 7878
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: radarr-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: radarr-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.25
    conditions:
      ready: true
ports:
  - name: ""
    port: 7878
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: bazarr-external
  namespace: default
spec:
  ports:
    - port: 6767
      targetPort: 6767
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: bazarr-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: bazarr-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.25
    conditions:
      ready: true
ports:
  - name: ""
    port: 6767
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr-external
  namespace: default
spec:
  ports:
    - port: 9696
      targetPort: 9696
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: prowlarr-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: prowlarr-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.25
    conditions:
      ready: true
ports:
  - name: ""
    port: 9696
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: profilarr-external
  namespace: default
spec:
  ports:
    - port: 6868
      targetPort: 6868
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: profilarr-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: profilarr-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.25
    conditions:
      ready: true
ports:
  - name: ""
    port: 6868
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: sabnzbd-external
  namespace: default
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: sabnzbd-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: sabnzbd-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.25
    conditions:
      ready: true
ports:
  - name: ""
    port: 8080
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: media-allowlist
  namespace: default
spec:
  ipAllowList:
    sourceRange:
      - 100.64.0.0/10       # Tailscale IPv4 CGNAT
      - fd7a:115c:a1e0::/48 # Tailscale ULA IPv6
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: media-ingress-amer-dev
  namespace: default
spec:
  entryPoints:
    - websecure
  tls:
    secretName: media-amer-dev-tls
  routes:
    - match: Host(`media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: jellyfin-external
          port: 8096
    - match: Host(`sonarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: sonarr-external
          port: 8989
    - match: Host(`radarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: radarr-external
          port: 7878
    - match: Host(`bazarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: bazarr-external
          port: 6767
    - match: Host(`prowlarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: prowlarr-external
          port: 9696
    - match: Host(`profilarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: profilarr-external
          port: 6868
    - match: Host(`sabnzbd.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: sabnzbd-external
          port: 8080
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: media-amer-dev
  namespace: default
spec:
  secretName: media-amer-dev-tls
  dnsNames:
    - media.amer.dev
    - "*.media.amer.dev"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
