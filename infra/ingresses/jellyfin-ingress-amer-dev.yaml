apiVersion: v1
kind: Service
metadata:
  name: seerr-external
  namespace: default
spec:
  ports:
    - port: 5055
      targetPort: 5055
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: seerr-external-1
  namespace: default
  labels:
    kubernetes.io/service-name: seerr-external
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.19
    conditions:
      ready: true
ports:
  - name: ""
    port: 5055
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: media-allowlist
  namespace: default
spec:
  ipAllowList:
    sourceRange:
      - 10.0.0.0/8           # RFC1918 private range
      - 172.16.0.0/12        # RFC1918 private range
      - 192.168.0.0/16       # RFC1918 private range
      - 100.64.0.0/10       # Tailscale IPv4 CGNAT
      - 127.0.0.0/8          # localhost
      - ::1/128              # localhost IPv6
      - fc00::/7             # private/ULA IPv6
      - fd7a:115c:a1e0::/48  # Tailscale ULA IPv6
      - 73.238.31.98/32       # Alex public IP (home/internet)
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: media-ingress-amer-dev
  namespace: default
spec:
  entryPoints:
    - websecure
  tls:
    secretName: media-amer-dev-tls
  routes:
    - match: Host(`media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: jellyfin-external
          port: 8096
    - match: Host(`seerr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: seerr-external
          port: 5055
    - match: Host(`sonarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: sonarr-external
          port: 8989
    - match: Host(`radarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: radarr-external
          port: 7878
    - match: Host(`bazarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: bazarr-external
          port: 6767
    - match: Host(`prowlarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: prowlarr-external
          port: 9696
    - match: Host(`profilarr.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: profilarr-external
          port: 6868
    - match: Host(`sabnzbd.media.amer.dev`)
      kind: Rule
      middlewares:
        - name: media-allowlist
          namespace: default
      services:
        - name: sabnzbd-external
          port: 8081
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: media-amer-dev
  namespace: default
spec:
  secretName: media-amer-dev-tls
  dnsNames:
    - media.amer.dev
    - "*.media.amer.dev"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
# DNS records — internal-only. Pointed at Traefik VIP (10.100.20.203) so all
# traffic stays on-LAN. DDNS CronJob no longer manages these endpoints.
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: media-amer-dev
  namespace: default
spec:
  endpoints:
    - dnsName: media.amer.dev
      recordTTL: 300
      recordType: A
      targets:
        - 10.100.20.203
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: media-wildcard-amer-dev
  namespace: default
spec:
  endpoints:
    - dnsName: "*.media.amer.dev"
      recordTTL: 300
      recordType: A
      targets:
        - 10.100.20.203
