---
# Service + Endpoints for Komodo running on Mac Mini (external to k3s)
apiVersion: v1
kind: Service
metadata:
  name: komodo-external
  namespace: default
spec:
  ports:
    - port: 9120
      targetPort: 9120
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: komodo-external
  namespace: default
subsets:
  - addresses:
      - ip: 100.92.232.76  # Mac Mini Tailscale IP (WireGuard encrypted)
    ports:
      - port: 9120
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: komodo-ingress-amer-dev
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: komodo.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - komodo.amer.dev
      secretName: komodo-amer-dev-tls
  rules:
    - host: komodo.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: komodo-external
                port:
                  number: 9120
