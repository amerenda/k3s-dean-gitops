---
# Public webhook ingress for Komodo (mac-mini-compose GitOps)
# Routes only /listener/github/* paths to Komodo Core on Mac Mini.
# Used by GitHub webhooks to trigger push-based deploys.
# Reuses the komodo-external Service + EndpointSlice from komodo-ingress-amer-dev.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pubhooks-ingress-amer-dev
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # DNS managed by DNSEndpoint + DDNS CronJob (public IP, not LB IP)
    # Do NOT add external-dns annotations here — they would override with the LB private IP
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - pubhooks.amer.dev
      secretName: pubhooks-amer-dev-tls
  rules:
    - host: pubhooks.amer.dev
      http:
        paths:
          - path: /listener/github/
            pathType: Prefix
            backend:
              service:
                name: komodo-external
                port:
                  number: 9120
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: pubhooks-amer-dev
  namespace: default
spec:
  endpoints:
    - dnsName: pubhooks.amer.dev
      recordTTL: 300
      recordType: A
      targets:
        - 67.250.71.110
