---
# Public webhook ingress for Komodo (mac-mini-compose GitOps)
# Routes only /listener/github/* paths to Komodo Core on Mac Mini.
# Used by GitHub webhooks to trigger push-based deploys.
# Reuses the komodo-external Service + EndpointSlice from komodo-ingress-amer-dev.yaml.
#
# Uses IngressRoute (not Ingress) so external-dns doesn't pick up the host
# and override DNS with the LB private IP. DNS is managed by the DNSEndpoint
# below + the DDNS CronJob which keeps it pointed at the public IP.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pubhooks-ingress-amer-dev
  namespace: default
spec:
  entryPoints:
    - websecure
  tls:
    secretName: pubhooks-amer-dev-tls
  routes:
    - match: Host(`pubhooks.amer.dev`) && PathPrefix(`/listener/github/`)
      kind: Rule
      services:
        - name: komodo-external
          port: 9120
    - match: Host(`pubhooks.amer.dev`) && PathPrefix(`/praetor/webhooks/github`)
      kind: Rule
      middlewares:
        - name: strip-praetor-prefix
          namespace: default
      services:
        - name: praetor-webhook-adapter-proxy
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-praetor-prefix
  namespace: default
spec:
  stripPrefix:
    prefixes:
      - /praetor
---
# Concrete Service+Endpoints in default ns pointing to praetor-webhook-adapter ClusterIP.
# Traefik CRD provider supports neither cross-namespace refs nor ExternalName services,
# so we hardcode the ClusterIP here. Update if the praetor-webhook-adapter service is recreated.
apiVersion: v1
kind: Service
metadata:
  name: praetor-webhook-adapter-proxy
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: praetor-webhook-adapter-proxy
  namespace: default
subsets:
  - addresses:
      - ip: 10.43.9.46
    ports:
      - port: 80
---
# TLS cert — auto-created by cert-manager annotation on the old Ingress won't
# work for IngressRoute, so we need an explicit Certificate resource.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pubhooks-amer-dev
  namespace: default
spec:
  secretName: pubhooks-amer-dev-tls
  dnsNames:
    - pubhooks.amer.dev
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
# DNS record — managed by DDNS CronJob (keeps target = current public IP).
# The `targets` value below is NOT authoritative — the infra-ingresses
# Application has an ignoreDifferences entry for this field specifically so
# ArgoCD's selfHeal never reverts the CronJob's live patches. Kept roughly
# current here just so this file isn't misleading to read.
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: pubhooks-amer-dev
  namespace: default
spec:
  endpoints:
    - dnsName: pubhooks.amer.dev
      recordTTL: 300
      recordType: A
      targets:
        - 67.250.70.153
