# Longhorn Helm Chart Values

# Install CRDs automatically
installCRDs: true

# Global tolerations and node selector for Longhorn components
global:
  tolerations:
    - key: "longhorn"
      operator: "Exists"
      effect: "NoSchedule"
  nodeSelector:
    longhorn-storage: "true"

# Longhorn Manager (DaemonSet) — runs on all storage nodes
longhornManager:
  tolerations:
    - key: "longhorn"
      operator: "Exists"
      effect: "NoSchedule"
  nodeSelector:
    longhorn-storage: "true"

# Longhorn UI — push away from memory-constrained rpi5-0
longhornUI:
  replicas: 2
  tolerations:
    - key: "longhorn"
      operator: "Exists"
      effect: "NoSchedule"
  nodeSelector:
    longhorn-storage: "true"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                  - rpi5-0

# CSI sidecars — reduce replicas and keep off rpi5-0
# These are leader-elected; only 1 active at a time anyway
csi:
  attacherReplicaCount: 2
  provisionerReplicaCount: 2
  resizerReplicaCount: 2
  snapshotterReplicaCount: 2
  kubeletRootDir: /var/lib/rancher/k3s/agent/kubelet

# Longhorn settings
defaultSettings:
  defaultReplicaCount: 3
  systemManagedComponentsNodeSelector: "longhorn-storage:true"
  replicaAutoBalance: disabled
  concurrentReplicaRebuildPerNodeLimit: 1
  concurrentAutomaticEngineUpgradePerNodeLimit: 1
  disableSchedulingOnCordonedNode: true
  nodeDrainPolicy: block-if-contains-last-replica
  createDefaultDiskLabeledNodes: true
  replicaSoftAntiAffinity: false
  replicaZoneSoftAntiAffinity: true
  # Reduce instance manager CPU reservation (default 12% per node)
  guaranteedInstanceManagerCPU: 6
  kubernetesClusterAutoscalerEnabled: false

# Disable pre-upgrade hook to avoid service account dependency issues
preUpgradeChecker:
  jobEnabled: false

defaultBackupStore:
  backupTarget: s3://amerenda-backups@us/k3s/dean
  backupTargetCredentialSecret: gcs-backup-credentials
  pollInterval: 300

metrics:
  serviceMonitor:
    enabled: true

service:
  ui:
    type: LoadBalancer
    annotations:
      external-dns.alpha.kubernetes.io/hostname: longhorn.amer.home
      external-dns.alpha.kubernetes.io/ttl: "1"
      metallb.universe.tf/loadBalancerIPs: "10.100.20.202"
