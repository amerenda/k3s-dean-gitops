# Longhorn Configuration for Raspberry Pi Cluster
# Storage nodes: rpi5-0 (8GB), rpi5-1 (16GB), rpi4-0 (4GB)
# Non-storage: murderbot (no longhorn-storage label), rpi3-0 (scheduling disabled)
#
# rpi5-0 is memory-constrained (8GB with control-plane + etcd + longhorn).
# Concurrent rebuild limit reduced to 1 to prevent OOM kills on that node.
# System-managed components (CSI sidecars, instance managers) steered to
# longhorn-storage nodes via node selector in Helm values.

apiVersion: v1
kind: ConfigMap
metadata:
  name: longhorn-node-labels
  namespace: default
data:
  # Reference: which nodes run Longhorn storage
  # kubectl label node <node-name> longhorn-storage=true
  storage-nodes: "rpi5-0,rpi5-1,rpi4-0,murderbot"
  excluded-nodes: "rpi3-0"
