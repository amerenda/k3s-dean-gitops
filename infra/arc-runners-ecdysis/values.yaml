# ARC runner scale set for amerenda/ecdysis
# DinD mode — Docker-in-Docker on murderbot (x86, plenty of resources)
githubConfigUrl: "https://github.com/amerenda/ecdysis"
runnerScaleSetName: arc-runner-set
githubConfigSecret: controller-manager
controllerServiceAccount:
  name: infra-arc-controller
  namespace: arc-systems
minRunners: 0
maxRunners: 3
containerMode:
  type: dind
template:
  spec:
    nodeSelector:
      kubernetes.io/hostname: murderbot
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKERHUB_USERNAME
            value: "amerenda"
          - name: DOCKERHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: DOCKERHUB_TOKEN
          - name: GITOPS_PAT
            valueFrom:
              secretKeyRef:
                name: runner-ci-credentials
                key: GITOPS_PAT
namespaceOverride: arc-runners-ecdysis
