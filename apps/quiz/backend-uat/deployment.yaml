apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-backend-uat
  namespace: quiz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quiz-backend-uat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: quiz-backend-uat
    spec:
      containers:
        - name: backend
          image: amerenda/quiz:backend-sha-ee2a54e
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
                  optional: true
            - name: DATABASE_URL
              value: "postgres://quiz:$(DB_PASSWORD)@agent-kb.amer.dev:5432/quiz"
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-id
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-secret
                  optional: true
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secret
                  key: secret
                  optional: true
            - name: GITHUB_ALLOWED_USERS
              value: "amerenda"
            - name: APP_ORIGIN
              value: "https://quiz.amer.dev"
            - name: ENVIRONMENT
              value: "uat"
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
