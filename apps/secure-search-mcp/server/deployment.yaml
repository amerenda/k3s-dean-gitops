apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-search-mcp-server
  namespace: secure-search-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-search-mcp-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: secure-search-mcp-server
    spec:
      # gluetun owns the pod's network namespace. All containers share it, so all egress
      # physically routes through the VPN tunnel regardless of application code.
      # The MCP server also performs a hard code-level check (via gluetun's control API)
      # before every tool call — readinessProbe gates traffic until VPN is established.
      containers:
        # ── gluetun: NordVPN VPN client ──────────────────────────────────────────
        # Controls network namespace. Routes ALL egress through NordVPN Switzerland.
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true  # required for iptables + TUN interface creation
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "nordvpn"
            - name: VPN_TYPE
              value: "openvpn"
            # NordVPN token-based OpenVPN auth: username=token, password=<access-token>
            - name: OPENVPN_USER
              value: "token"
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secure-search-mcp-secrets
                  key: NORDVPN_ACCESS_TOKEN
            - name: SERVER_COUNTRIES
              value: "Switzerland"
            # Gluetun defaults: internal healthcheck=127.0.0.1:9999, control server=:8000.
            # Move control server to 8001 — MCP server occupies 8000, and 9999 is
            # already used by gluetun's internal healthcheck (bind conflict).
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8001"
            - name: TZ
              value: "UTC"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - containerPort: 8001
              name: vpn-ctrl
          livenessProbe:
            httpGet:
              path: /v1/openvpn/status
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # ── secure-search-mcp: MCP server ────────────────────────────────────────
        # Shares gluetun's network namespace — traffic physically routes via VPN.
        # Also performs a hard code-level VPN check before every tool call.
        - name: server
          image: amerenda/secure-search-mcp:sha-placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: mcp
          env:
            - name: SEARXNG_URL
              value: "http://searxng.searxng.svc.cluster.local:8080"
            - name: GLUETUN_CONTROL_URL
              value: "http://localhost:8001"
            - name: MAX_RESULTS
              value: "5"
            - name: MAX_CONTENT_CHARS
              value: "600"
            - name: MAX_URL_CONTENT_CHARS
              value: "4000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 384Mi
