apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-search-mcp-server
  namespace: secure-search-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-search-mcp-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: secure-search-mcp-server
    spec:
      # gluetun owns the pod's network namespace. All containers share it, so all egress
      # physically routes through the VPN tunnel regardless of application code.
      # The MCP server also performs a hard code-level check (via gluetun's control API)
      # before every tool call — readinessProbe gates traffic until VPN is established.
      containers:
        # ── gluetun: NordVPN VPN client ──────────────────────────────────────────
        # Controls network namespace. Routes ALL egress through NordVPN Switzerland.
        - name: gluetun
          image: ghcr.io/qdm12/gluetun:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true  # required for iptables + TUN interface creation
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "nordvpn"
            - name: VPN_TYPE
              value: "openvpn"
            # gluetun uses the access token to fetch OpenVPN service credentials
            # automatically from the NordVPN API — no manual username/password needed.
            - name: NORDVPN_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secure-search-mcp-secrets
                  key: NORDVPN_ACCESS_TOKEN
            - name: SERVER_COUNTRIES
              value: "Switzerland"
            # Control server on 8001 — MCP occupies 8000, gluetun internal health on 9999.
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8001"
            # Allow cluster-internal subnets to bypass the VPN tunnel.
            # Pod CIDR (10.42.0.0/16) and Service CIDR (10.43.0.0/16) must be reachable
            # so that internal DNS and SearXNG calls work. External traffic still goes through VPN.
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.42.0.0/16,10.43.0.0/16"
            - name: TZ
              value: "UTC"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - containerPort: 8001
              name: vpn-ctrl
          # TCP probe — avoids the control server's HTTP authentication requirement.
          # If gluetun exits (crash), the port closes and k8s restarts the container.
          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

        # ── secure-search-mcp: MCP server ────────────────────────────────────────
        # Shares gluetun's network namespace — traffic physically routes via VPN.
        # Also performs a hard code-level VPN check before every tool call.
        - name: server
          image: amerenda/secure-search-mcp:sha-c323698
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: mcp
          env:
            - name: SEARXNG_URL
              value: "http://searxng.searxng.svc.cluster.local:8080"
            - name: MAX_RESULTS
              value: "5"
            - name: MAX_CONTENT_CHARS
              value: "600"
            - name: MAX_URL_CONTENT_CHARS
              value: "4000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 384Mi
