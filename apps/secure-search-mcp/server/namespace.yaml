apiVersion: v1
kind: Namespace
metadata:
  name: secure-search-mcp
  labels:
    # gluetun VPN sidecar requires NET_ADMIN + privileged to set up iptables / TUN interface
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
