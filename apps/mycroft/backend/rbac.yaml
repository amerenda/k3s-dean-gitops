apiVersion: v1
kind: ServiceAccount
metadata:
  name: mycroft-backend
  namespace: mycroft
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mycroft-argo-submitter
  namespace: mycroft
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mycroft-argo-submitter
  namespace: mycroft
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mycroft-argo-submitter
subjects:
  - kind: ServiceAccount
    name: mycroft-backend
    namespace: mycroft
