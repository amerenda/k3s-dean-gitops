apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycroft-backend
  namespace: mycroft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mycroft-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mycroft-backend
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: mycroft-backend
      containers:
        - name: coordinator
          image: amerenda/mycroft:coordinator-sha-2e49417
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: KB_DSN
              valueFrom:
                secretKeyRef:
                  name: mycroft-credentials
                  key: kb-dsn
            - name: LLM_MANAGER_URL
              value: "http://llm-manager-backend.llm-manager.svc:8081"
            - name: LLM_REGISTRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: mycroft-credentials
                  key: llm-registration-secret
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mycroft-credentials
                  key: telegram-bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: mycroft-credentials
                  key: telegram-chat-id
            - name: INTENT_MODEL
              value: "qwen2.5:7b"
            - name: AGENT_IMAGE_TAG
              value: "sha-9813fd9"
            - name: AGENT_IMAGE_REPO
              value: "amerenda/mycroft"
            - name: ARGO_NAMESPACE
              value: "mycroft"
            - name: BRIDGE_WORKER_URL
              value: "http://mycroft-bridge-worker.mycroft.svc:8082"
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: mycroft-credentials
                  key: github-app-id
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: mycroft-credentials
                  key: github-app-installation-id
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: mycroft-credentials
                  key: github-app-private-key
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
