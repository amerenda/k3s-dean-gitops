apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mycroft-credentials
  namespace: mycroft
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: mycroft-credentials
    creationPolicy: Owner
  data:
    - secretKey: kb-dsn
      remoteRef:
        key: mycroft-dean-agent-kb-dsn
        property: password
    - secretKey: telegram-bot-token
      remoteRef:
        key: mycroft-dean-telegram-bot-token
        property: password
    - secretKey: telegram-chat-id
      remoteRef:
        key: mycroft-dean-telegram-chat-id
        property: password
    - secretKey: llm-registration-secret
      remoteRef:
        key: llm-manager-registration-secret
        property: password
    - secretKey: github-token
      remoteRef:
        key: mycroft-dean-github-token
        property: password
    - secretKey: vikunja-token
      remoteRef:
        key: vikjuna-api-key-full-access
        property: password
    - secretKey: github-app-id
      remoteRef:
        key: github-app-coder-bot-id
        property: password
    - secretKey: github-app-installation-id
      remoteRef:
        key: github-app-coder-bot-installation-id
        property: password
    - secretKey: github-app-private-key
      remoteRef:
        key: github-app-coder-bot-private-key
        property: password
