apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycroft-bridge-worker-uat
  namespace: mycroft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mycroft-bridge-worker-uat
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mycroft-bridge-worker-uat
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      containers:
        - name: bridge-worker
          image: amerenda/mycroft:bridge-worker-sha-7d8e28c
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: WORKSPACE
              value: /workspace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: mycroft-bridge-worker-uat-workspace
