apiVersion: apps/v1
kind: Deployment
metadata:
  name: phase16-e2e-backend-uat
  namespace: phase16-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phase16-e2e-backend-uat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: phase16-e2e-backend-uat
    spec:
      containers:
        - name: backend
          image: amerenda/phase16-e2e:backend-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "uat"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
