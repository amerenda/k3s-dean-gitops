apiVersion: apps/v1
kind: Deployment
metadata:
  name: phase16-e2e-backend
  namespace: phase16-e2e
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phase16-e2e-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: phase16-e2e-backend
    spec:
      containers:
        - name: backend
          image: amerenda/phase16-e2e:backend-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
