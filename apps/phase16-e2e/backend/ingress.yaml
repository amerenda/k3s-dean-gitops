apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phase16-e2e-ingress
  namespace: phase16-e2e
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: phase16-e2e.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - phase16-e2e.amer.dev
      secretName: phase16-e2e-amer-dev-tls
  rules:
    - host: phase16-e2e.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phase16-e2e-backend
                port:
                  number: 8000
