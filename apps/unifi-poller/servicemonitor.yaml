apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unifi-poller
  namespace: unifi-poller
  labels:
    app: unifi-poller
spec:
  selector:
    matchLabels:
      app: unifi-poller
  namespaceSelector:
    matchNames:
      - unifi-poller
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
