apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: praetor-mcp-secrets
  namespace: praetor-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: praetor-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: PRAETOR_API_KEY
      remoteRef:
        key: praetor-api-key
        property: password
