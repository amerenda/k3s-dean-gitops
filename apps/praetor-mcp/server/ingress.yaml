apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: praetor-mcp-ingress
  namespace: praetor-mcp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: praetor-mcp.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - praetor-mcp.amer.dev
      secretName: praetor-mcp-amer-dev-tls
  rules:
    - host: praetor-mcp.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: praetor-mcp-server
                port:
                  number: 8000
