apiVersion: apps/v1
kind: Deployment
metadata:
  name: moltbook-frontend
  namespace: ecdysis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moltbook-frontend
  template:
    metadata:
      labels:
        app: moltbook-frontend
    spec:
      initContainers:
        - name: register-with-llm-manager
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - |
              echo "Registering ecdysis with llm-manager..."
              curl -sf -X POST \
                http://llm-manager-backend.llm-manager.svc.cluster.local:8081/api/apps/discover \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"ecdysis\",\"base_url\":\"https://ecdysis.amer.dev\",\"registration_secret\":\"${REGISTRATION_SECRET}\",\"capabilities\":[\"moltbook-agents\"]}" \
              && echo "Registration complete" || echo "Registration failed (may already be registered)"
          env:
            - name: REGISTRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: registration-secret
                  key: registration-secret
      containers:
        - name: frontend
          image: amerenda/ecdysis:frontend-sha-02e79d8
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
