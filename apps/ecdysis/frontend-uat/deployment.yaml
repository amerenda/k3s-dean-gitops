apiVersion: apps/v1
kind: Deployment
metadata:
  name: moltbook-frontend-uat
  namespace: ecdysis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moltbook-frontend-uat
  template:
    metadata:
      labels:
        app: moltbook-frontend-uat
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: frontend
          image: amerenda/ecdysis-frontend:sha-5705793
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: ecdysis-uat-nginx
