apiVersion: v1
kind: ConfigMap
metadata:
  name: ecdysis-uat-seed-data
  namespace: ecdysis
data:
  seed.sql: |
    -- Safety check: abort if not UAT database
    DO $$
    BEGIN
      IF current_database() NOT LIKE '%uat%' THEN
        RAISE EXCEPTION 'Refusing to run: database "%" does not contain "uat"', current_database();
      END IF;
    END $$;

    -- Truncate all tables
    TRUNCATE TABLE
      system_logs,
      moltbook_activity,
      moltbook_peer_interactions,
      moltbook_peer_posts,
      moltbook_state,
      moltbook_configs
    CASCADE;

    -- Seed 6 agent slots with test personas
    -- Slots 1-3: registered + claimed (simulate active agents with fake API keys)
    -- Slots 4-5: registered but unclaimed (simulate pending setup)
    -- Slot 6: unregistered (empty slot)
    INSERT INTO moltbook_configs (slot, name, description, tone, topics, model, enabled, registered, claimed, api_key, target_submolts) VALUES
      (1, 'TestBot Alpha', 'A friendly test agent for UAT.', 'casual, upbeat', '["technology","gaming"]', 'qwen2.5:7b', true, true, true, 'moltbook_sk_uat_fake_alpha_000000000000', '["technology","gaming"]'),
      (2, 'TestBot Beta', 'A thoughtful test agent.', 'analytical, calm', '["science","philosophy"]', 'qwen2.5:7b', true, true, true, 'moltbook_sk_uat_fake_beta_0000000000000', '["science","philosophy"]'),
      (3, 'TestBot Gamma', 'A creative test agent.', 'witty, playful', '["art","music","humor"]', 'llama3.2:3b', false, true, true, 'moltbook_sk_uat_fake_gamma_000000000000', '["art","humor"]'),
      (4, 'TestBot Delta', 'A helpful test agent.', 'warm, supportive', '["advice","wellness"]', 'llama3.2:3b', false, true, false, '', '[]'),
      (5, 'TestBot Epsilon', 'A curious test agent.', 'inquisitive, friendly', '["news","current events"]', 'mistral:7b', false, true, false, '', '[]'),
      (6, 'TestBot Zeta', 'A chill test agent.', 'laid-back, humorous', '["memes","internet culture"]', 'mistral:7b', false, false, false, '', '[]');

    -- Seed state rows for each slot
    -- last_post_time and next_post_time are epoch floats, last_heartbeat is timestamptz
    INSERT INTO moltbook_state (slot, karma, last_heartbeat, last_post_time, next_post_time) VALUES
      (1, 42, NOW() - interval '5 minutes', extract(epoch from NOW() - interval '15 minutes'), extract(epoch from NOW() + interval '90 minutes')),
      (2, 15, NOW() - interval '12 minutes', extract(epoch from NOW() - interval '2 hours'), extract(epoch from NOW() + interval '45 minutes')),
      (3, 88, NOW() - interval '20 minutes', extract(epoch from NOW() - interval '5 minutes'), extract(epoch from NOW() + interval '2 hours')),
      (4, 5, NULL, 0, 0),
      (5, 23, NULL, 0, 0),
      (6, 0, NULL, 0, 0);

    -- Seed activity for slots 1-3 (use "Done" prefix for heartbeats — frontend uses this)
    INSERT INTO moltbook_activity (slot, action, detail, created_at) VALUES
      -- Slot 1: active agent with recent activity
      (1, 'heartbeat', 'Done — browsed feed, replied to 2 comments, upvoted 1 post', NOW() - interval '5 minutes'),
      (1, 'posted', 'New post: ''Testing in UAT is the best kind of testing'' → m/technology', NOW() - interval '15 minutes'),
      (1, 'replied', 'Replied to 1 comments on post abc123', NOW() - interval '18 minutes'),
      (1, 'heartbeat', 'Done — browsed feed, no new notifications', NOW() - interval '35 minutes'),
      (1, 'heartbeat', 'Done — browsed feed, upvoted 3 posts', NOW() - interval '65 minutes'),
      (1, 'heartbeat', 'Done — browsed feed, replied to 1 comments', NOW() - interval '95 minutes'),
      -- Slot 2: active agent with a recent error
      (2, 'heartbeat', 'Done — browsed feed, no new notifications', NOW() - interval '12 minutes'),
      (2, 'error', 'Failed to create post: 400 Bad Request — {"error":"submolt not found"}', NOW() - interval '30 minutes'),
      (2, 'heartbeat', 'Done — browsed feed, upvoted 2 posts', NOW() - interval '42 minutes'),
      (2, 'skipped_post', 'LLM returned empty content — post not created', NOW() - interval '50 minutes'),
      (2, 'heartbeat', 'Done — browsed feed, replied to 3 comments', NOW() - interval '72 minutes'),
      (2, 'heartbeat', 'Done — browsed feed, no new notifications', NOW() - interval '102 minutes'),
      -- Slot 3: recently active
      (3, 'heartbeat', 'Done — browsed feed, upvoted 3 posts', NOW() - interval '20 minutes'),
      (3, 'posted', 'New post: ''Art is just math with feelings'' → m/art', NOW() - interval '25 minutes'),
      (3, 'heartbeat', 'Done — browsed feed, replied to 1 comments', NOW() - interval '50 minutes'),
      (3, 'heartbeat', 'Done — browsed feed, no new notifications', NOW() - interval '80 minutes');

    -- Seed system logs
    INSERT INTO system_logs (source, level, logger_name, message, pod_name, created_at) VALUES
      ('backend', 'INFO', '__main__', 'Database connected', 'ecdysis-backend-uat-abc123', NOW() - interval '2 hours'),
      ('backend', 'INFO', '__main__', 'Advisory lock connection established', 'ecdysis-backend-uat-abc123', NOW() - interval '2 hours'),
      ('backend', 'INFO', 'agent_runner', 'Slot 1 already running on another replica', 'ecdysis-backend-uat-def456', NOW() - interval '1 hour'),
      ('backend', 'WARNING', 'agent_runner', 'Agent 2 lock check error: connection reset — retrying in 30s', 'ecdysis-backend-uat-abc123', NOW() - interval '30 minutes'),
      ('backend', 'ERROR', 'agent_runner', 'Failed to create post: 400 Bad Request — {"error":"submolt not found"}', 'ecdysis-backend-uat-abc123', NOW() - interval '15 minutes');
