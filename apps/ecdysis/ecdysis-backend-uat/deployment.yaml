apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecdysis-backend-uat
  namespace: ecdysis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecdysis-backend-uat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: ecdysis-backend-uat
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        kubernetes.io/hostname: murderbot
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      containers:
        - name: ecdysis-backend
          image: amerenda/ecdysis-backend:sha-5b9a4b6
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-sql-postgres-credentials-uat
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://ecdysis_uat:$(PGPASSWORD)@127.0.0.1:5432/ecdysis_uat"
            - name: DB_POOL_MIN
              value: "1"
            - name: DB_POOL_MAX
              value: "5"
            - name: LLM_MANAGER_AGENT_PSK
              valueFrom:
                secretKeyRef:
                  name: agent-psk
                  key: psk
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--port=5432"
            - "amerenda-k3s:us-east1:k3s-dean-postgres"
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/sa-key.json
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: cloud-sql-sa-key
