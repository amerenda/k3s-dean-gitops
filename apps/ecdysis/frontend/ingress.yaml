apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecdysis-ingress
  namespace: ecdysis
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: ecdysis-tailscale-only@kubernetescrd
    # Middleware ref format: <namespace>-<name>@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: ecdysis.amer.dev,moltbook-manager.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - ecdysis.amer.dev
        - moltbook-manager.amer.dev
      secretName: ecdysis-amer-dev-tls
  rules:
    - host: ecdysis.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: moltbook-frontend
                port:
                  number: 80
    - host: moltbook-manager.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: moltbook-frontend
                port:
                  number: 80
