apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tailscale-only
  namespace: ecdysis
spec:
  ipAllowList:
    # 10.100.20.0/24  — direct LAN access (home network)
    # 10.42.0.0/16    — Flannel pod CIDR (in-cluster traffic)
    # 100.64.0.0/10   — Tailscale CGNAT range (remote Tailscale clients)
    # 127.0.0.1/32    — localhost (healthchecks, kube-probe)
    sourceRange:
      - 10.100.20.0/24
      - 10.42.0.0/16
      - 100.64.0.0/10
      - 127.0.0.1/32
