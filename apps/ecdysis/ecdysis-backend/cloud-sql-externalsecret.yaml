apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloud-sql-sa-key
  namespace: ecdysis
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: cloud-sql-sa-key
    creationPolicy: Owner
  data:
    - secretKey: sa-key.json
      remoteRef:
        key: dean-cloud-sql-sa-key
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloud-sql-postgres-credentials
  namespace: ecdysis
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: cloud-sql-postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: dean-cloud-sql-ecdysis-password
        property: password
