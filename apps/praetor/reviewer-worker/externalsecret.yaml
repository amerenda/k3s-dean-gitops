apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: praetor-reviewer-secrets
  namespace: praetor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: praetor-reviewer-secrets
    creationPolicy: Owner
  data:
    - secretKey: hatchet-token
      remoteRef:
        key: hatchet-worker-api-token
        property: password
    - secretKey: litellm-api-key
      remoteRef:
        key: litellm-master-key
        property: password
    - secretKey: reviewer-app-id
      remoteRef:
        key: github-amerenda-reviewer-app-id
        property: password
    - secretKey: reviewer-private-key
      remoteRef:
        key: github-amerenda-reviewer-private-key
        property: password
    - secretKey: reviewer-installation-id
      remoteRef:
        key: github-amerenda-reviewer-installation-id
        property: password
    - secretKey: mem0-api-key
      remoteRef:
        key: mem0-admin-api-key
        property: password
    - secretKey: langfuse-public-key
      remoteRef:
        key: langfuse-public-key
        property: password
    - secretKey: langfuse-secret-key
      remoteRef:
        key: langfuse-secret-key
        property: password
