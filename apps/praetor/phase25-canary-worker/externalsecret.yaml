apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: praetor-phase25-canary-secrets
  namespace: praetor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: praetor-phase25-canary-secrets
    creationPolicy: Owner
  data:
    - secretKey: hatchet-token
      remoteRef:
        key: hatchet-worker-api-token
        property: password
    - secretKey: mem0-api-key
      remoteRef:
        key: mem0-admin-api-key
        property: password
    - secretKey: litellm-api-key
      remoteRef:
        key: litellm-master-key
        property: password
    - secretKey: vikunja-token
      remoteRef:
        key: vikjuna-api-key-full-access
        property: password
    - secretKey: langfuse-public-key
      remoteRef:
        key: langfuse-public-key
        property: password
    - secretKey: langfuse-secret-key
      remoteRef:
        key: langfuse-secret-key
        property: password
