apiVersion: apps/v1
kind: Deployment
metadata:
  name: praetor-echo-agent-worker
  namespace: praetor
spec:
  replicas: 0
  selector:
    matchLabels:
      app: praetor-echo-agent-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: praetor-echo-agent-worker
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: echo-agent-worker
          image: amerenda/praetor-echo-agent:sha-cc39d4b
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
          env:
            - name: HATCHET_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: praetor-echo-agent-secrets
                  key: hatchet-token
            - name: HATCHET_CLIENT_TLS_STRATEGY
              value: "none"
            - name: MEM0_BASE_URL
              value: "https://mem0.amer.dev"
            - name: MEM0_API_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-echo-agent-secrets
                  key: mem0-api-key
            - name: VIKUNJA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: praetor-echo-agent-secrets
                  key: vikunja-token
            - name: VIKUNJA_BASE_URL
              value: "https://todo.amer.dev"
            - name: LITELLM_BASE_URL
              value: "https://litellm.amer.dev/v1"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-echo-agent-secrets
                  key: litellm-api-key
            - name: LLM_MODEL
              value: "echo-agent"
            - name: SCRATCH_DIR
              value: "/scratch"
            - name: LITELLM_MCP_URL
              value: "https://litellm.amer.dev/mcp/"
            - name: LANGFUSE_HOST
              value: "https://langfuse.amer.dev"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-echo-agent-secrets
                  key: langfuse-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-echo-agent-secrets
                  key: langfuse-secret-key
          volumeMounts:
            - name: scratch
              mountPath: /scratch
            - name: home
              mountPath: /home/appuser
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: scratch
          emptyDir:
            sizeLimit: 4Gi
        - name: home
          emptyDir: {}
