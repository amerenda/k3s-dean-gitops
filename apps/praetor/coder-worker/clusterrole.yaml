apiVersion: v1
kind: ServiceAccount
metadata:
  name: praetor-coder
  namespace: praetor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: praetor-coder-reader
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: praetor-coder-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: praetor-coder-reader
subjects:
  - kind: ServiceAccount
    name: praetor-coder
    namespace: praetor
