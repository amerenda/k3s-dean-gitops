apiVersion: v1
kind: ServiceAccount
metadata:
  name: praetor-coder
  namespace: praetor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: praetor-coder-reader
rules:
  # Core resources — configmaps, secrets, pods for reading worker state and configuration
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list"]
  # Apps resources — deployments, replicasets for managing infrastructure
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  # Batch resources — jobs and cronjobs for running one-off tasks
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: praetor-coder-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: praetor-coder-reader
subjects:
  - kind: ServiceAccount
    name: praetor-coder
    namespace: praetor
