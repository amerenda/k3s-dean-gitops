apiVersion: apps/v1
kind: Deployment
metadata:
  name: praetor-research-worker
  namespace: praetor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: praetor-research-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: praetor-research-worker
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: research-worker
          image: amerenda/praetor-research:sha-564c62b
          imagePullPolicy: Always
          env:
            - name: HATCHET_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: praetor-research-secrets
                  key: hatchet-token
            - name: HATCHET_CLIENT_TLS_STRATEGY
              value: "none"
            - name: MEM0_BASE_URL
              value: "https://mem0.amer.dev"
            - name: MEM0_API_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-research-secrets
                  key: mem0-api-key
            - name: VIKUNJA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: praetor-research-secrets
                  key: vikunja-token
            - name: VIKUNJA_BASE_URL
              value: "https://todo.amer.dev"
            - name: LITELLM_BASE_URL
              value: "https://litellm.amer.dev/v1"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-research-secrets
                  key: litellm-api-key
            - name: LITELLM_MCP_URL
              value: "https://litellm.amer.dev/mcp/"
            - name: LLM_MODEL
              value: "qwen3-35b"
            - name: LANGFUSE_HOST
              value: "https://langfuse.amer.dev"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-research-secrets
                  key: langfuse-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-research-secrets
                  key: langfuse-secret-key
          ports:
            - name: metrics
              containerPort: 9095
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
