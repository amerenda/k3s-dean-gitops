apiVersion: apps/v1
kind: Deployment
metadata:
  name: praetor-openhands-worker
  namespace: praetor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: praetor-openhands-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: praetor-openhands-worker
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: openhands-worker
          image: amerenda/praetor-openhands:sha-d18015f
          imagePullPolicy: Always
          env:
            - name: HATCHET_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: praetor-openhands-secrets
                  key: hatchet-token
            - name: HATCHET_CLIENT_TLS_STRATEGY
              value: "none"
            - name: MEM0_BASE_URL
              value: "https://mem0.amer.dev"
            - name: MEM0_API_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-openhands-secrets
                  key: mem0-api-key
            - name: OPENHANDS_BASE_URL
              value: "http://openhands.openhands.svc.cluster.local"
            - name: OPENHANDS_UI_URL
              value: "https://hands.amer.dev"
            - name: LANGFUSE_HOST
              value: "https://langfuse.amer.dev"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-openhands-secrets
                  key: langfuse-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-openhands-secrets
                  key: langfuse-secret-key
          ports:
            - name: metrics
              containerPort: 9095
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
