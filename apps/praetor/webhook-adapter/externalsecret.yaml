apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: praetor-webhook-secrets
  namespace: praetor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: praetor-webhook-secrets
    creationPolicy: Owner
  data:
    - secretKey: vikunja-webhook-secret
      remoteRef:
        key: vikunja-webhook-secret
        property: password
    - secretKey: vikunja-token
      remoteRef:
        key: vikjuna-api-key-full-access
        property: password
    - secretKey: hatchet-token
      remoteRef:
        key: hatchet-worker-api-token
        property: password
    - secretKey: github-webhook-secret
      remoteRef:
        key: github-webhook-secret
        property: password
    - secretKey: praetor-api-key
      remoteRef:
        key: praetor-api-key
        property: password
    - secretKey: mem0-api-key
      remoteRef:
        key: mem0-admin-api-key
        property: password
    - secretKey: coder-app-id
      remoteRef:
        key: github-amerenda-coder-app-id
        property: password
    - secretKey: coder-private-key
      remoteRef:
        key: github-amerenda-coder-private-key
        property: password
    - secretKey: coder-installation-id
      remoteRef:
        key: github-amerenda-coder-installation-id
        property: password
    - secretKey: litellm-api-key
      remoteRef:
        key: litellm-master-key
        property: password
    - secretKey: langfuse-public-key
      remoteRef:
        key: langfuse-public-key
        property: password
    - secretKey: langfuse-secret-key
      remoteRef:
        key: langfuse-secret-key
        property: password
    - secretKey: db-password
      remoteRef:
        key: praetor-db-password
        property: password
