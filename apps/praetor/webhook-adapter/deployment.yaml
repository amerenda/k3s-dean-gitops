apiVersion: apps/v1
kind: Deployment
metadata:
  name: praetor-webhook-adapter
  namespace: praetor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: praetor-webhook-adapter
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: praetor-webhook-adapter
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      serviceAccountName: praetor-webhook-adapter
      containers:
        - name: webhook-adapter
          image: amerenda/praetor-webhook:sha-1827ed0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: webhook-adapter-config
          env:
            - name: VIKUNJA_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: vikunja-webhook-secret
            - name: VIKUNJA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: vikunja-token
            - name: HATCHET_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: hatchet-token
            - name: HATCHET_CLIENT_TLS_STRATEGY
              value: "none"
            - name: VIKUNJA_BASE_URL
              value: "https://todo.amer.dev"
            - name: VIKUNJA_PROJECT_ID
              value: "21"
            - name: WEBHOOK_TARGET_URL
              value: "https://praetor.amer.dev/webhooks/vikunja"
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: github-webhook-secret
            - name: PRAETOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: praetor-api-key
            - name: MEM0_BASE_URL
              value: "https://mem0.amer.dev"
            - name: MEM0_API_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: mem0-api-key
            - name: CODER_APP_ID
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: coder-app-id
            - name: CODER_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: coder-private-key
            - name: CODER_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: coder-installation-id
            - name: LITELLM_BASE_URL
              value: "http://litellm-server.litellm.svc.cluster.local:4000/v1"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: litellm-api-key
            - name: PRAETOR_BASE_URL
              value: "http://praetor-webhook-adapter.praetor.svc.cluster.local"
            - name: LLM_SWITCH_URL
              value: "http://10.100.20.19:8091"
            - name: LLM_SWITCH_PSK
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: llm-switch-psk
            - name: LLM_MODEL
              value: "qwen3-35b"
            - name: LANGFUSE_HOST
              value: "https://langfuse.amer.dev"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: langfuse-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: langfuse-secret-key
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: praetor-webhook-secrets
                  key: db-password
            - name: PRAETOR_DB_URL
              value: "postgresql://praetor:$(DB_PASSWORD)@agent-kb.amer.dev:5432/praetor"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
