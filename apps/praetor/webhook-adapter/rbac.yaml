apiVersion: v1
kind: ServiceAccount
metadata:
  name: praetor-webhook-adapter
  namespace: praetor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: praetor-webhook-configmap-rw
  namespace: praetor
rules:
  # create cannot use resourceNames (no name in request URL yet)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["mcp-registry", "agent-registry"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: praetor-webhook-configmap-rw
  namespace: praetor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: praetor-webhook-configmap-rw
subjects:
  - kind: ServiceAccount
    name: praetor-webhook-adapter
    namespace: praetor
