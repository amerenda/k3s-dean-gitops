apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr-node-nvidia
  namespace: tdarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tdarr-node-nvidia
  template:
    metadata:
      labels:
        app: tdarr-node-nvidia
    spec:
      nodeSelector:
        kubernetes.io/hostname: murderbot
      containers:
        - name: tdarr-node
          image: ghcr.io/haveagitgat/tdarr_node:2.82.02
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              nvidia.com/gpu: 1
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK_SET
              value: "002"
            - name: nodeName
              value: "murderbot-nvidia"
            - name: serverIP
              value: tdarr-server.tdarr.svc.cluster.local
            - name: serverPort
              value: "8266"
            - name: inContainer
              value: "true"
            - name: ffmpegVersion
              value: "7"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: transcodegpuWorkers
              value: "1"
            - name: transcodecpuWorkers
              value: "2"
            - name: healthcheckgpuWorkers
              value: "1"
            - name: healthcheckcpuWorkers
              value: "1"
            - name: apiKey
              valueFrom:
                secretKeyRef:
                  name: tdarr-api-key
                  key: TDARR_API_KEY
          volumeMounts:
            - name: configs
              mountPath: /app/configs
            - name: movies
              mountPath: /movies
            - name: tv
              mountPath: /tv
            - name: transcode-cache
              mountPath: /temp
      volumes:
        - name: configs
          hostPath:
            path: /mnt/storage/media/config/tdarr/configs
            type: DirectoryOrCreate
        - name: movies
          hostPath:
            path: /mnt/storage/movies
            type: Directory
        - name: tv
          hostPath:
            path: /mnt/storage/tv
            type: Directory
        - name: transcode-cache
          hostPath:
            path: /mnt/storage/cache/tdarr
            type: DirectoryOrCreate
