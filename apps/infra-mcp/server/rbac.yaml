apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tofu-state
  namespace: infra-mcp
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "list", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tofu-state
  namespace: infra-mcp
subjects:
- kind: ServiceAccount
  name: default
  namespace: infra-mcp
roleRef:
  kind: Role
  name: tofu-state
  apiGroup: rbac.authorization.k8s.io
