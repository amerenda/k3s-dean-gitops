apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: infra-mcp-secrets
  namespace: infra-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: infra-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: bws-access-token
      remoteRef:
        key: infra-mcp-bws-token
        property: password
    - secretKey: coder-app-id
      remoteRef:
        key: github-amerenda-coder-app-id
        property: password
    - secretKey: coder-installation-id
      remoteRef:
        key: github-amerenda-coder-installation-id
        property: password
    - secretKey: coder-private-key
      remoteRef:
        key: github-amerenda-coder-private-key
        property: password
    - secretKey: gcs-access-key
      remoteRef:
        key: tofu-gcs-access-key
        property: password
    - secretKey: gcs-secret-key
      remoteRef:
        key: tofu-gcs-secret-key
        property: password
