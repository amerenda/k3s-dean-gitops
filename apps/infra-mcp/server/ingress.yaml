apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infra-mcp-ingress
  namespace: infra-mcp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: infra-mcp.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - infra-mcp.amer.dev
      secretName: infra-mcp-amer-dev-tls
  rules:
    - host: infra-mcp.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infra-mcp-server
                port:
                  number: 8000
