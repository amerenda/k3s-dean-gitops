apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-ro-mcp-backend-uat
  namespace: kubernetes-ro-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-ro-mcp-backend-uat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: kubernetes-ro-mcp-backend-uat
    spec:
      containers:
        - name: backend
          image: flux159/mcp-server-kubernetes:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: ENABLE_UNSAFE_STREAMABLE_HTTP_TRANSPORT
              value: "true"
            - name: ALLOW_ONLY_READONLY_TOOLS
              value: "true"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
