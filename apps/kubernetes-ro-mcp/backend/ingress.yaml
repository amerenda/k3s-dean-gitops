apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubernetes-ro-mcp-ingress
  namespace: kubernetes-ro-mcp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: kubernetes-ro-mcp.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - kubernetes-ro-mcp.amer.dev
      secretName: kubernetes-ro-mcp-amer-dev-tls
  rules:
    - host: kubernetes-ro-mcp.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubernetes-ro-mcp-backend
                port:
                  number: 8000
