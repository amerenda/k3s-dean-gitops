apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-ro-mcp-backend
  namespace: kubernetes-ro-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubernetes-ro-mcp-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: kubernetes-ro-mcp-backend
    spec:
      containers:
        - name: backend
          image: flux159/mcp-server-kubernetes:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: ENABLE_UNSAFE_STREAMABLE_HTTP_TRANSPORT
              value: "true"
            - name: ALLOW_ONLY_READONLY_TOOLS
              value: "true"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
