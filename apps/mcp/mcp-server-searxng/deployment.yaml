apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-searxng-server
  namespace: mcp-mcp-server-searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server-searxng-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mcp-server-searxng-server
    spec:
      containers:
        - name: server
          image: ghcr.io/mrkrino/mcp-server-searxng:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
