apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-home-assistant-server
  namespace: mcp-mcp-home-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-home-assistant-server
  template:
    metadata:
      labels:
        app: mcp-home-assistant-server
    spec:
      containers:
        - name: server
          image: ghcr.io/home-assistant-mcp/mcp-server-homeassistant:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: HA_URL
              value: 'http://homeassistant.local:8123'
            - name: HA_TOKEN
              value: ''

          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
