apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-mcp-nginx-proxy
  namespace: mcp-kubernetes-mcp
data:
  default.conf: |
    server {
      listen 8080;
      location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host localhost;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
      }
    }
