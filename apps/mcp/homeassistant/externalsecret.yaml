apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homeassistant-secrets
  namespace: mcp-homeassistant
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: homeassistant-secrets
    creationPolicy: Owner
  data:
    - secretKey: homeassistant_token
      remoteRef:
        key: home-assistant-access-token