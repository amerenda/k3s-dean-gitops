apiVersion: apps/v1
kind: Deployment
metadata:
  name: verify-phase21-c9b-server
  namespace: mcp-verify-phase21-c9b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verify-phase21-c9b-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: verify-phase21-c9b-server
    spec:
      containers:
        - name: server
          image: mendhak/http-https-echo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
