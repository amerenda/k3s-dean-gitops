---
# ClusterIP service with explicit EndpointSlice — routes directly to murderbot at 10.100.20.19:3002.
# Avoids DNS-based ExternalName which was intermittently failing because cluster nodes forward
# to both 1.1.1.1 and 8.8.8.8 and the latter had a 30-min negative cache for murderbot.amer.dev.
# Uses EndpointSlice (not Endpoints) because ArgoCD excludes Endpoints from management.
apiVersion: v1
kind: Service
metadata:
  name: moltbook
  namespace: moltbook
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3002
      targetPort: 3002
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: moltbook
  namespace: moltbook
  labels:
    kubernetes.io/service-name: moltbook
addressType: IPv4
endpoints:
  - addresses:
      - "10.100.20.19"
    conditions:
      ready: true
      serving: true
      terminating: false
ports:
  - name: http
    port: 3002
    protocol: TCP
