apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moltbook-ingress
  namespace: moltbook
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: moltbook.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - moltbook.amer.dev
      secretName: moltbook-amer-dev-tls
  rules:
    - host: moltbook.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: moltbook
                port:
                  number: 3002
