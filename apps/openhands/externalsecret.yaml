apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openhands-secrets
  namespace: openhands
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: openhands-secrets
    creationPolicy: Owner
  data:
    - secretKey: llm-registration-secret
      remoteRef:
        key: llm-manager-registration-secret
        property: password
    - secretKey: github-app-id
      remoteRef:
        key: github-app-coder-bot-id
        property: password
    - secretKey: github-app-installation-id
      remoteRef:
        key: github-app-coder-bot-installation-id
        property: password
    - secretKey: github-app-private-key
      remoteRef:
        key: github-app-coder-bot-private-key
        property: password
