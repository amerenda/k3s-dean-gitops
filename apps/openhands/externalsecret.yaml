apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openhands-secrets
  namespace: openhands
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: openhands-secrets
    creationPolicy: Owner
  data:
    - secretKey: litellm-master-key
      remoteRef:
        key: litellm-master-key
        property: password
    - secretKey: github-app-id
      remoteRef:
        key: github-amerenda-coder-app-id
        property: password
    - secretKey: github-app-installation-id
      remoteRef:
        key: github-amerenda-coder-installation-id
        property: password
    - secretKey: github-app-private-key
      remoteRef:
        key: github-amerenda-coder-private-key
        property: password
    - secretKey: langfuse-public-key
      remoteRef:
        key: langfuse-public-key
        property: password
    - secretKey: langfuse-secret-key
      remoteRef:
        key: langfuse-secret-key
        property: password
