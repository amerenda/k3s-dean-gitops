apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openhands-secrets
  namespace: openhands
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: openhands-secrets
    creationPolicy: Owner
  data:
    - secretKey: llm-api-key
      remoteRef:
        key: openhands-llm-api-key
        property: password
    - secretKey: github-token
      remoteRef:
        key: openhands-github-token
        property: password
