apiVersion: v1
kind: ServiceAccount
metadata:
  name: openhands
  namespace: openhands
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openhands-api-key-patcher
  namespace: openhands
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["openhands-api-key"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openhands-api-key-patcher
  namespace: openhands
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openhands-api-key-patcher
subjects:
  - kind: ServiceAccount
    name: openhands
    namespace: openhands
