apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  namespace: openhands
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openhands
  template:
    metadata:
      labels:
        app: openhands
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: openhands
      # Needs Docker socket — pin to murderbot (primary) or archlinux.
      # supplementalGroups 989 = docker GID on Debian (murderbot).
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - murderbot
                      - archlinux
      securityContext:
        supplementalGroups: [989]

      initContainers:
        - name: fix-perms
          image: busybox:latest
          command: ["sh", "-c", "chown -R 1000:1000 /.openhands"]
          volumeMounts:
            - name: workspace
              mountPath: /.openhands
              subPath: .openhands

      containers:
        - name: openhands
          image: ghcr.io/all-hands-ai/openhands:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: openhands-config
          env:
            - name: SANDBOX_USER_ID
              value: "1000"
            - name: DOCKER_HOST_ADDR
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: litellm-master-key
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: github-app-id
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: github-app-installation-id
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: github-app-private-key
          volumeMounts:
            - name: workspace
              mountPath: /.openhands
              subPath: .openhands
            - name: workspace
              mountPath: /workspace
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: mcp-config
              mountPath: /etc/openhands/config.toml
              subPath: config.toml
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: openhands-workspace
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: mcp-config
          configMap:
            name: openhands-mcp-config
