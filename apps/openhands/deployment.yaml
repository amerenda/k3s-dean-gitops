apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  namespace: openhands
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openhands
  template:
    metadata:
      labels:
        app: openhands
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: openhands

      initContainers:
        - name: fix-perms
          image: busybox:latest
          command: ["sh", "-c", "chown -R 1000:1000 /.openhands /workspace"]
          volumeMounts:
            - name: data
              mountPath: /.openhands
              subPath: .openhands
            - name: scratch
              mountPath: /workspace

      containers:
        - name: openhands
          image: ghcr.io/all-hands-ai/openhands:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: openhands-config
          env:
            - name: SANDBOX_USER_ID
              value: "1000"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: litellm-master-key
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: github-app-id
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: github-app-installation-id
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: openhands-secrets
                  key: github-app-private-key
          volumeMounts:
            - name: data
              mountPath: /.openhands
              subPath: .openhands
            - name: scratch
              mountPath: /workspace
            - name: mcp-config
              mountPath: /etc/openhands/config.toml
              subPath: config.toml
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openhands-workspace
        - name: scratch
          persistentVolumeClaim:
            claimName: openhands-scratch
        - name: mcp-config
          configMap:
            name: openhands-mcp-config
