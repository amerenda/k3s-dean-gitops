apiVersion: v1
kind: ConfigMap
metadata:
  name: openhands-config
  namespace: openhands
data:
  # ── Switch models by editing LLM_MODEL — pod auto-restarts via reloader ───
  LLM_MODEL: "openai/qwen3:14b"
  # Available on archlinux (17GB VRAM):
  #   openai/qwen3:14b              ~8GB   tools+thinking  ← default, reliable
  #   openai/qwen3:30b              ~17GB  tools+thinking  best quality, fills VRAM
  #   openai/qwen3.6:27b            ~14GB  tools+thinking  good balance
  #   openai/deepseek-r1:14b        ~8GB   tools+thinking  strong reasoning
  #   openai/qwen2.5-coder:7b       ~4GB   tools           lighter, code-focused
  # ─────────────────────────────────────────────────────────────────────────
  LLM_BASE_URL: "https://llm-manager.amer.dev"
  WORKSPACE_BASE: "/workspace"
  SANDBOX_RUNTIME_CONTAINER_IMAGE: "ghcr.io/all-hands-ai/runtime:latest"
  DOCKER_HOST: "unix:///var/run/docker.sock"
