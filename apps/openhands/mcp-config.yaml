apiVersion: v1
kind: ConfigMap
metadata:
  name: openhands-mcp-config
  namespace: openhands
data:
  config.toml: |
    [mcp]

    # infra-mcp: k3s/Komodo provisioning, secret hygiene, app scaffolding
    [[mcp.shttp_servers]]
    url = "http://infra-mcp-server.infra-mcp.svc.cluster.local:8000/mcp"

    # bws-mcp: Bitwarden Secrets Manager proxy
    [[mcp.shttp_servers]]
    url = "http://bws-mcp-server.bws-mcp.svc.cluster.local:8000/mcp"
