apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-searxng-server
  namespace: mcp-searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-searxng-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mcp-searxng-server
    spec:
      containers:
        - name: server
          image: amerenda/mcp-searxng:sha-91efaac
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: SEARXNG_URL
              value: "http://searxng.searxng.svc.cluster.local:8080"
            - name: MAX_RESULTS
              value: "5"
            - name: MAX_CONTENT_CHARS
              value: "200"
            - name: MAX_URL_CONTENT_CHARS
              value: "4000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
