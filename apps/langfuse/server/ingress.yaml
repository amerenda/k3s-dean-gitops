apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langfuse-ingress
  namespace: langfuse
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: langfuse.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - langfuse.amer.dev
      secretName: langfuse-amer-dev-tls
  rules:
    - host: langfuse.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse-server
                port:
                  number: 3000
