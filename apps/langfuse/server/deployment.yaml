apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-server
  namespace: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: langfuse-server
    spec:
      containers:
        - name: server
          image: langfuse/langfuse:2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PG_CRED
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: password
            - name: DATABASE_URL
              value: "postgresql://langfuse:$(PG_CRED)@10.100.20.18:5432/langfuse"
            - name: NEXTAUTH_URL
              value: "https://langfuse.amer.dev"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: nextauth-secret
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: salt
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              value: "true"
            - name: TELEMETRY_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
