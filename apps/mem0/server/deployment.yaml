apiVersion: apps/v1
kind: Deployment
metadata:
  name: mem0-server
  namespace: mem0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mem0-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mem0-server
    spec:
      containers:
        - name: server
          image: amerenda/mem0-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mem0-config
          env:
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mem0-auth-secrets
                  key: admin-api-key
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mem0-auth-secrets
                  key: jwt-secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mem0-postgres-credentials
                  key: password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mem0-litellm-credentials
                  key: master-key
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
