apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mem0-auth-secrets
  namespace: mem0
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: mem0-auth-secrets
    creationPolicy: Owner
  data:
    - secretKey: admin-api-key
      remoteRef:
        key: mem0-admin-api-key
        property: password
    - secretKey: jwt-secret
      remoteRef:
        key: mem0-jwt-secret
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mem0-postgres-credentials
  namespace: mem0
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: mem0-postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: mem0-postgres-password
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mem0-litellm-credentials
  namespace: mem0
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: mem0-litellm-credentials
