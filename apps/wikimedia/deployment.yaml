apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikimedia
  namespace: wikimedia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikimedia
  template:
    metadata:
      labels:
        app: wikimedia
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      containers:
        - name: wikimedia
          image: amerenda/wikimedia:sha-dc653e1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: wikimedia-db-credentials
                  key: password
            - name: DATABASE_URL
              value: "postgresql://wikimedia:$(PGPASSWORD)@agent-kb.amer.dev:5432/wikimedia"
            - name: WIKI_SITE_NAME
              value: "Homelab Wiki"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
