apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bws-mcp-token
  namespace: bws-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: bws-mcp-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: infra-mcp-bws-token
        property: password
