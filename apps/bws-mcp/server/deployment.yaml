apiVersion: apps/v1
kind: Deployment
metadata:
  name: bws-mcp-server
  namespace: bws-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bws-mcp-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: bws-mcp-server
    spec:
      containers:
        - name: server
          image: amerenda/bws-mcp:sha-2c16e67
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: BWS_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bws-mcp-token
                  key: token
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
