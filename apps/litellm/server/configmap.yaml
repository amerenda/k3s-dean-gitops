apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # --- murderbot (RTX 4000, 24GB, llama.cpp — always hot) ---
      - model_name: qwen3-35b
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen3-35b-think: thinking-enabled variant for OpenWebUI interactive chat.
      # Model reasons about when to call tools; thinking is stripped from output
      # (server default preserve_thinking=false) so users see only real content.
      # Do NOT use for Claude Code / opencode (thinking adds ~1-3s TTFT latency).
      # NOTE: uses thinking={budget_tokens:8192} not chat_template_kwargs.enable_thinking.
      # enable_thinking:true without a budget causes Jinja template overflow with 60+ tools (400).
      - model_name: qwen3-35b-think
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            thinking:
              type: enabled
              budget_tokens: 8192
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # coder is an alias for qwen3-35b — lets agents and UIs pick
      # a coding-optimised endpoint without hardcoding the model name.
      # Swap the backend here when a dedicated coding model is added.
      - model_name: coder
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-unrestricted: abliterated Qwen3.6-35B-A3B (llmfan46, Heretic v1.3.0, MTP-preserved).
      # Points to the same :8088 endpoint as qwen3-35b-think — swap the running model before use:
      #   docker stop llama-server
      #   docker run ... -e MODEL=.../Qwen3.6-35B-A3B-uncensored-Q4_K_M.gguf ...
      # See ~/claude/manual_runs/swap-to-unrestricted-model.sh
      - model_name: qwen36-unrestricted
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            thinking:
              type: enabled
              budget_tokens: 8192
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # --- archlinux (RX 9070 XT, 16GB VRAM, Ollama) ---
      - model_name: qwen3-14b
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      - model_name: deepseek-r1
        litellm_params:
          model: ollama/deepseek-r1:14b
          api_base: http://10.100.20.25:11434
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- qwen3-8b: group across archlinux + mac-mini, least-busy routing ---
      - model_name: qwen3-8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://10.100.20.25:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      - model_name: qwen3-8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://10.100.20.18:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- mac-mini (16GB unified, Ollama) ---
      # embedder — used by mem0, not shown in chat UIs
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://10.100.20.18:11434
          drop_params: true

    router_settings:
      routing_strategy: least-busy
      num_retries: 3
      retry_after: 2
      cooldown_time: 30
      allowed_fails: 5
      retry_policy:
        BadRequestErrorRetries: 3

    mcp_servers:
      web:
        url: "http://mcp-searxng-server.mcp-searxng.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      infra:
        url: "http://infra-mcp-server.infra-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      github:
        url: "http://github-mcp-server.github-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      kubernetes-mcp:
        url: "http://kubernetes-mcp-server.mcp-kubernetes-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      praetor:
        url: "http://praetor-mcp-server.praetor-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true

      homeassistant:
        url: "http://homeassistant-server.mcp-homeassistant.svc.cluster.local:8086/mcp"
        transport: "http"
    litellm_settings:
      drop_params: true
      callbacks:
        - custom_hooks.tool_strip_hook.proxy_handler_instance
        - prometheus
