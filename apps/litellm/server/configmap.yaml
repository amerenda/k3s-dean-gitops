apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: qwen3-35b
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://10.100.20.18:11434
      - model_name: ollama/*
        litellm_params:
          model: ollama/*
          api_base: http://10.100.20.18:11434
      - model_name: archlinux/ollama/*
        litellm_params:
          model: ollama/*
          api_base: http://10.100.20.25:11434

    router_settings:
      routing_strategy: least-busy
      num_retries: 3
      retry_after: 5
      cooldown_time: 60
      allowed_fails: 3
