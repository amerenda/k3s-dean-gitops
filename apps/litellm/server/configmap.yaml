apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: qwen3-35b
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://10.100.20.18:11434
          drop_params: true
      - model_name: ollama/*
        litellm_params:
          model: ollama/*
          api_base: http://10.100.20.18:11434
          extra_body:
            think: false
      - model_name: archlinux/ollama/*
        litellm_params:
          model: ollama/*
          api_base: http://10.100.20.25:11434
          extra_body:
            think: false

    router_settings:
      routing_strategy: least-busy
      num_retries: 3
      retry_after: 2
      cooldown_time: 30
      allowed_fails: 5
      retry_policy:
        BadRequestErrorRetries: 3
