apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # --- murderbot (RTX PRO 4000, 24GB, vLLM/nvidia/Qwen3.6-27B-NVFP4 — always hot) ---

      # coder: used by OpenHands and praetor-coder-worker.
      # parallel_tool_calls=false: coding agents must execute tools sequentially (read → edit → verify);
      # parallel calls cause race conditions on file state.
      # No max_completion_tokens: OpenHands controls output via LLM_MAX_OUTPUT_TOKENS=4096.
      # No truncate_prompt_tokens: OpenHands manages context via its memory condenser.
      - model_name: coder
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 16384
          max_output_tokens: 4096
          supports_function_calling: true

      # qwen3-35b: alias used by praetor pipeline/feature-pipeline/webhook-adapter workers.
      # truncate_prompt_tokens: rolling window prevents 400s when orchestration context grows large.
      - model_name: qwen3-35b
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
            truncate_prompt_tokens: 14336
        model_info:
          max_input_tokens: 14336
          max_output_tokens: 2048
          supports_function_calling: true

      # murderbot-v1-base: canonical preset name for qwen36-27b (censored).
      # Budget split: 8192 input (truncate rolling window) + 8192 output = 16384 total context.
      # vLLM shares max_tokens between thinking and visible content — with max_output_tokens=2048,
      # the model exhausted the entire budget on thinking and produced 0 visible content.
      # 8192 output tokens: ~2000–3000 for thinking, 5000–6000 remaining for visible response.
      - model_name: murderbot-v1-base
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
            truncate_prompt_tokens: 8192
        model_info:
          max_input_tokens: 8192
          max_output_tokens: 8192
          supports_function_calling: true

      # murderbot-uncensored-v1-base: abliterated model alias.
      # Routes to sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-TEXT-MTP (served as qwen36-27b).
      - model_name: murderbot-uncensored-v1-base
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
            truncate_prompt_tokens: 8192
        model_info:
          max_input_tokens: 8192
          max_output_tokens: 8192
          supports_function_calling: true

      # murderbot-v1-research-base: kept for backwards compat with existing OWU presets.
      # New work should use murderbot-v2-base instead.
      - model_name: murderbot-v1-research-base
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 120
          extra_body:
            parallel_tool_calls: false
            truncate_prompt_tokens: 12288
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 12288
          max_output_tokens: 1024
          supports_function_calling: true

      # murderbot-v2-base: single unified entrypoint for OWU (replaces v1-base + v1-research-base).
      # thinking off: Qwen3 extended reasoning adds 3-10min latency on synthesis turns; the
      # model is capable enough without it for chat, research, code, and creative tasks.
      # 20480 input: 24576 model ctx - 4096 output budget. Fits multi-turn + 5-8 search results.
      # 4096 output: enough for comprehensive answers; uncapped output wastes tokens on padding.
      # tools (web search, infra, k8s) are configured in the OWU model preset, not here.
      # Backed by sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-TEXT-MTP (served as qwen36-27b).
      # Both v2-custom (gated) and v2-uncensored-custom (permissive) use this base; behavior
      # is controlled entirely by the OWU system prompt, not by model weights.
      - model_name: murderbot-v2-base
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 120
          extra_body:
            parallel_tool_calls: false
            truncate_prompt_tokens: 20480
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 20480
          max_output_tokens: 4096
          supports_function_calling: true

      # --- archlinux (RX 9070 XT, 16GB VRAM, Ollama — qwen3:14b at ~51 t/s) ---
      # Base model names use -base suffix so OWU only shows the configured presets
      # (archlinux-v0-custom → archlinux-v0, archlinux-uncensored-v0-custom → archlinux-uncensored-v0).

      - model_name: archlinux-v0-base
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 16384
          max_output_tokens: 4096
          supports_function_calling: true

      - model_name: archlinux-uncensored-v0-base
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 16384
          max_output_tokens: 4096
          supports_function_calling: true

      # --- image-gen (imggen service on k3s, ComfyUI on murderbot:8188) ---
      # Routes to imggen FastAPI proxy which expands prompts via archlinux qwen3:14b
      # then generates via ComfyUI FLUX FP8 + LoRA stack. Returns base64 PNG in markdown.
      # Only active when img-murderbot Komodo stack is running (image mode).
      # timeout=300: ComfyUI generation takes 30-90s; 300s covers slow first-generation.
      - model_name: image-gen
        litellm_params:
          model: openai/image-gen
          api_base: http://imggen-server.imggen.svc.cluster.local:8000/v1
          api_key: none
          timeout: 300
        model_info:
          max_input_tokens: 4096
          max_output_tokens: 65536
          supports_function_calling: false

    router_settings:
      routing_strategy: least-busy
      num_retries: 3
      retry_after: 2
      cooldown_time: 30
      allowed_fails: 5
      retry_policy:
        BadRequestErrorRetries: 3

    mcp_servers:
      searxng:
        url: "http://mcp-searxng-server.mcp-searxng.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      secure-search:
        url: "http://secure-search-mcp-server.secure-search-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      infra:
        url: "http://infra-mcp-server.infra-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      github:
        url: "http://github-mcp-server.github-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      kubernetes-mcp:
        url: "http://kubernetes-mcp-server.mcp-kubernetes-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      praetor:
        url: "http://praetor-mcp-server.praetor-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true

      # homeassistant: removed from LiteLLM MCP — 89 HA tools added ~36K tokens to every
      # model request via server:mcp:lm, causing prompt processing timeouts (30-60s) and
      # intermittent 400s from the llama.cpp jinja template renderer. Total tool count drops
      # from 123 to 34; prompt token overhead drops from ~36K to ~6K.
      # HA tools remain accessible via the mcp-bridge OpenAPI endpoint in OWU.
    litellm_settings:
      drop_params: true
      callbacks:
        - prometheus
