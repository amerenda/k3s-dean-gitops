apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # --- murderbot (RTX PRO 4000, 24GB, vLLM/nvidia/Qwen3.6-27B-NVFP4 — always hot) ---
      - model_name: qwen3-35b
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen3-35b-think: OWU interactive chat variant (murderbot-v0).
      - model_name: qwen3-35b-think
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 8192
          supports_function_calling: true

      # coder: coding-optimised alias for qwen3-35b endpoint.
      - model_name: coder
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-35b / qwen36-35b-think: named aliases for backward compat.
      - model_name: qwen36-35b
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 8192
          supports_function_calling: true

      - model_name: qwen36-35b-think
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-27b: dense 27B NVFP4 — primary murderbot model.
      - model_name: qwen36-27b
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-27b-think: OWU murderbot-v1 preset.
      - model_name: qwen36-27b-think
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-unrestricted: abliterated model alias — swap running model via model-switcher before use.
      - model_name: qwen36-unrestricted
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 8192
          supports_function_calling: true

      # --- archlinux (RX 9070 XT, 16GB VRAM, Ollama — qwen3:14b at ~51 t/s) ---
      # Base model names use -base suffix so OWU only shows the configured presets
      # (archlinux-v0-custom → archlinux-v0, archlinux-uncensored-v0-custom → archlinux-uncensored-v0).

      - model_name: archlinux-v0-base
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096
          supports_function_calling: true

      - model_name: archlinux-uncensored-v0-base
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096
          supports_function_calling: true

      - model_name: qwen3-14b
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      - model_name: deepseek-r1
        litellm_params:
          model: ollama/deepseek-r1:14b
          api_base: http://10.100.20.25:11434
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- qwen3-8b: group across archlinux + mac-mini, least-busy routing ---
      - model_name: qwen3-8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://10.100.20.25:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      - model_name: qwen3-8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://10.100.20.18:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- mac-mini (16GB unified, Ollama) ---
      # embedder — used by mem0, not shown in chat UIs
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://10.100.20.18:11434
          drop_params: true

    router_settings:
      routing_strategy: least-busy
      num_retries: 3
      retry_after: 2
      cooldown_time: 30
      allowed_fails: 5
      retry_policy:
        BadRequestErrorRetries: 3

    mcp_servers:
      web:
        url: "http://mcp-searxng-server.mcp-searxng.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      infra:
        url: "http://infra-mcp-server.infra-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      github:
        url: "http://github-mcp-server.github-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      kubernetes-mcp:
        url: "http://kubernetes-mcp-server.mcp-kubernetes-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      praetor:
        url: "http://praetor-mcp-server.praetor-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true

      # homeassistant: removed from LiteLLM MCP — 89 HA tools added ~36K tokens to every
      # model request via server:mcp:lm, causing prompt processing timeouts (30-60s) and
      # intermittent 400s from the llama.cpp jinja template renderer. Total tool count drops
      # from 123 to 34; prompt token overhead drops from ~36K to ~6K.
      # HA tools remain accessible via the mcp-bridge OpenAPI endpoint in OWU.
    litellm_settings:
      drop_params: true
      callbacks:
        - prometheus
