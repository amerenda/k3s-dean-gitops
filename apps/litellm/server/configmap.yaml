apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # --- murderbot (RTX 4000, 24GB, llama.cpp — always hot) ---
      - model_name: qwen3-35b
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # coder is an alias for qwen3-35b — lets agents and UIs pick
      # a coding-optimised endpoint without hardcoding the model name.
      # Swap the backend here when a dedicated coding model is added.
      - model_name: coder
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- archlinux (RX 9070 XT, 16GB VRAM, Ollama) ---
      - model_name: qwen3-14b
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      - model_name: deepseek-r1
        litellm_params:
          model: ollama/deepseek-r1:14b
          api_base: http://10.100.20.25:11434
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- qwen3-8b: group across archlinux + mac-mini, least-busy routing ---
      - model_name: qwen3-8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://10.100.20.25:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      - model_name: qwen3-8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://10.100.20.18:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- mac-mini (16GB unified, Ollama) ---
      # embedder — used by mem0, not shown in chat UIs
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://10.100.20.18:11434
          drop_params: true

    router_settings:
      routing_strategy: least-busy
      num_retries: 3
      retry_after: 2
      cooldown_time: 30
      allowed_fails: 5
      retry_policy:
        BadRequestErrorRetries: 3

    mcp_servers:
      mcp_searxng:
        url: "http://mcp-searxng-server.mcp-searxng.svc.cluster.local:8000/mcp"
        transport: "http"
      github_mcp:
        url: "http://github-mcp-server.github-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
