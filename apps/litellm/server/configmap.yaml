apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # --- murderbot (RTX PRO 4000, 24GB, llama.cpp/Huihui-Qwen3.6-35B-A3B-abliterated-MTP — always hot) ---
      # Migrated 2026-07-23 from vLLM+Qwen3.6-27B-NVFP4 (tagged `qwen3.6-27b` in this repo and in
      # komodo-dean-gitops if this needs reverting) to llama.cpp+Qwen3.6-35B-A3B — same 24GB card,
      # but ~120-140 tok/s via MTP speculative decoding (vs ~25-32 tok/s) and 98,304 usable context
      # (vs 49,152), both empirically verified under real load, not calculated. See
      # komodo-dean-gitops/murderbot/llm/compose.yaml for the full rationale and the served alias
      # (--alias qwen36-35b-a3b) llama-server reports as its "model" name.
      #
      # llama.cpp has no `truncate_prompt_tokens` request-level param (that's vLLM-specific API
      # surface) — drop_params:true below silently drops it, so it's omitted entirely here rather
      # than left as dead config. Long-conversation overflow behavior for llama.cpp (does it error
      # cleanly, or context-shift?) has NOT yet been verified the way vLLM's truncation was —
      # tracked as an open follow-up, not yet covered by the smoke/context-exhaustion test suite.

      # coder: used by OpenHands, praetor-coder-worker, and opencode.
      # parallel_tool_calls=false: coding agents must execute tools sequentially (read → edit → verify);
      # parallel calls cause race conditions on file state.
      # enable_thinking=false: coding agents want fast tool-call iteration, not long reasoning chains.
      # 90112/8192 = 98304 total: matches llama-server's -c 98304 (murderbot/llm/compose.yaml).
      - model_name: coder
        litellm_params:
          model: openai/qwen36-35b-a3b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 90112
          max_output_tokens: 8192
          supports_function_calling: true

      # murderbot-v1-base: legacy smaller-budget preset, kept only because existing OWU custom
      # models (murderbot-v1-custom) still reference it as a base_model_id. Same backend as
      # every other murderbot-* alias now — budgets deliberately left conservative/unchanged.
      - model_name: murderbot-v1-base
        litellm_params:
          model: openai/qwen36-35b-a3b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 8192
          max_output_tokens: 8192
          supports_function_calling: true

      # murderbot-uncensored-v1-base: legacy alias, same rationale as murderbot-v1-base above.
      # True weight-level abliteration now (huihui-ai), not just a different prompt on the same
      # weights — the underlying model itself is already the uncensored one for every alias here.
      - model_name: murderbot-uncensored-v1-base
        litellm_params:
          model: openai/qwen36-35b-a3b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 8192
          max_output_tokens: 8192
          supports_function_calling: true

      # murderbot-v2-base: single unified entrypoint for OWU (replaces v1-base + v1-research-base).
      # thinking LEFT ON (unlike the old vLLM-era default): MTP speculative decoding means the
      # per-token cost of reasoning is much lower now, and real testing showed materially better
      # answer quality with thinking on than the latency cost justified turning it off for. Revisit
      # if real usage shows otherwise — this is a considered default, not a hard requirement.
      # 90112/8192 = 98304 total: matches llama-server's -c 98304 (murderbot/llm/compose.yaml).
      # tools (web search, infra, k8s) are configured in the OWU model preset, not here.
      # Both v2-custom (gated) and v2-uncensored-custom (permissive) use this base; behavior
      # is controlled entirely by the OWU system prompt, not by model weights.
      - model_name: murderbot-v2-base
        litellm_params:
          model: openai/qwen36-35b-a3b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 90112
          max_output_tokens: 8192
          supports_function_calling: true

      # --- archlinux (RX 9070 XT, 16GB VRAM, Ollama — qwen3:14b at ~51 t/s) ---
      # Base model names use -base suffix so OWU only shows the configured presets
      # (archlinux-v0-custom → archlinux-v0, archlinux-uncensored-v0-custom → archlinux-uncensored-v0).

      - model_name: archlinux-v0-base
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 16384
          max_output_tokens: 4096
          supports_function_calling: true

      - model_name: archlinux-uncensored-v0-base
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 16384
          max_output_tokens: 4096
          supports_function_calling: true

      # --- embeddings (nomic-embed-text via mac-mini Ollama for mem0) ---
      # mem0 uses this for vector search. Requires nomic-embed-text pulled on mac-mini:
      #   curl -X POST http://10.100.20.18:11434/api/pull -d '{"name":"nomic-embed-text"}'
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://10.100.20.18:11434
          api_key: none
        model_info:
          mode: embedding
          max_input_tokens: 8192
          output_vector_size: 768

      # --- image-gen (imggen service on k3s, ComfyUI on murderbot:8188) ---
      # Routes to imggen FastAPI proxy which expands prompts via archlinux qwen3:14b
      # then generates via ComfyUI FLUX FP8 + LoRA stack. Returns base64 PNG in markdown.
      # Only active when img-murderbot Komodo stack is running (image mode).
      # timeout=300: ComfyUI generation takes 30-90s; 300s covers slow first-generation.
      - model_name: image-gen
        litellm_params:
          model: openai/image-gen
          api_base: http://imggen-server.imggen.svc.cluster.local:8000/v1
          api_key: none
          timeout: 300
        model_info:
          max_input_tokens: 4096
          max_output_tokens: 65536
          supports_function_calling: false

    router_settings:
      routing_strategy: least-busy
      num_retries: 3
      retry_after: 2
      cooldown_time: 30
      allowed_fails: 5
      retry_policy:
        BadRequestErrorRetries: 3

    mcp_servers:
      searxng:
        url: "http://mcp-searxng-server.mcp-searxng.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      secure-search:
        url: "http://secure-search-mcp-server.secure-search-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      infra:
        url: "http://infra-mcp-server.infra-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      github:
        url: "http://github-mcp-server.github-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      kubernetes-mcp:
        url: "http://kubernetes-mcp-server.mcp-kubernetes-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      praetor:
        url: "http://praetor-mcp-server.praetor-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true

      # homeassistant: removed from LiteLLM MCP — 89 HA tools added ~36K tokens to every
      # model request via server:mcp:lm, causing prompt processing timeouts (30-60s) and
      # intermittent 400s from the llama.cpp jinja template renderer. Total tool count drops
      # from 123 to 34; prompt token overhead drops from ~36K to ~6K.
      # HA tools remain accessible via the mcp-bridge OpenAPI endpoint in OWU.
    litellm_settings:
      drop_params: true
      callbacks:
        - prometheus
