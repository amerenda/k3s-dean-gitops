apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # --- murderbot (RTX 4000, 24GB, llama.cpp — always hot) ---
      - model_name: qwen3-35b
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen3-35b-think: OWU interactive chat variant (murderbot-v0).
      # Thinking disabled: with the 27B dense model running, thinking causes the model
      # to loop indefinitely on tool calls and ignore "stop after N calls" instructions.
      # Re-enable with budget_tokens when switching back to the actual 35B MoE model.
      - model_name: qwen3-35b-think
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # coder is an alias for qwen3-35b — lets agents and UIs pick
      # a coding-optimised endpoint without hardcoding the model name.
      # Swap the backend here when a dedicated coding model is added.
      - model_name: coder
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-35b / qwen36-35b-think: named aliases for the 35B MoE.
      # Switching back to 35B requires only a model-switcher call, not a config change.
      - model_name: qwen36-35b
        litellm_params:
          model: openai/qwen36-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      - model_name: qwen36-35b-think
        litellm_params:
          model: openai/qwen36-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-27b: dense 27B, no MTP, no thinking — faster TTFT for simple queries
      - model_name: qwen36-27b
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-27b-think: OWU murderbot-v1 preset — thinking disabled.
      # The 27B dense model's max_tokens budget is shared between thinking and
      # output; with thinking enabled, synthesis turns return empty content.
      # Disabling thinking here fixes the synthesis bug without any proxy hook.
      - model_name: qwen36-27b-think
        litellm_params:
          model: openai/qwen36-27b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            chat_template_kwargs:
              enable_thinking: false
            parallel_tool_calls: false
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # qwen36-unrestricted: abliterated Qwen3.6-35B-A3B (llmfan46, Heretic v1.3.0, MTP-preserved).
      # Points to the same :8088 endpoint as qwen3-35b-think — swap the running model before use:
      #   docker stop llama-server
      #   docker run ... -e MODEL=.../Qwen3.6-35B-A3B-uncensored-Q4_K_M.gguf ...
      # See ~/claude/manual_runs/swap-to-unrestricted-model.sh
      - model_name: qwen36-unrestricted
        litellm_params:
          model: openai/qwen3-35b
          api_base: http://10.100.20.19:8088/v1
          api_key: none
          timeout: 600
          extra_body:
            thinking:
              type: enabled
              budget_tokens: 8192
        model_info:
          max_input_tokens: 131072
          max_output_tokens: 8192
          supports_function_calling: true

      # --- archlinux (RX 9070 XT, 16GB VRAM, Ollama — qwen3:14b at ~51 t/s) ---
      # Base model names use -base suffix so OWU only shows the configured presets
      # (archlinux-v0-custom → archlinux-v0, archlinux-uncensored-v0-custom → archlinux-uncensored-v0).

      - model_name: archlinux-v0-base
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096
          supports_function_calling: true

      - model_name: archlinux-uncensored-v0-base
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096
          supports_function_calling: true

      - model_name: qwen3-14b
        litellm_params:
          model: ollama/qwen3:14b
          api_base: http://10.100.20.25:11434
          timeout: 300
          extra_body:
            think: false
            options:
              num_ctx: 32768
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      - model_name: deepseek-r1
        litellm_params:
          model: ollama/deepseek-r1:14b
          api_base: http://10.100.20.25:11434
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- qwen3-8b: group across archlinux + mac-mini, least-busy routing ---
      - model_name: qwen3-8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://10.100.20.25:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      - model_name: qwen3-8b
        litellm_params:
          model: ollama/qwen3:8b
          api_base: http://10.100.20.18:11434
          extra_body:
            think: false
        model_info:
          max_input_tokens: 32768
          max_output_tokens: 4096

      # --- mac-mini (16GB unified, Ollama) ---
      # embedder — used by mem0, not shown in chat UIs
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://10.100.20.18:11434
          drop_params: true

    router_settings:
      routing_strategy: least-busy
      num_retries: 3
      retry_after: 2
      cooldown_time: 30
      allowed_fails: 5
      retry_policy:
        BadRequestErrorRetries: 3

    mcp_servers:
      web:
        url: "http://mcp-searxng-server.mcp-searxng.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      infra:
        url: "http://infra-mcp-server.infra-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      github:
        url: "http://github-mcp-server.github-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      kubernetes-mcp:
        url: "http://kubernetes-mcp-server.mcp-kubernetes-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true
      praetor:
        url: "http://praetor-mcp-server.praetor-mcp.svc.cluster.local:8000/mcp"
        transport: "http"
        allow_all_keys: true

      homeassistant:
        url: "http://homeassistant-server.mcp-homeassistant.svc.cluster.local:8086/mcp"
        transport: "http"
    litellm_settings:
      drop_params: true
      callbacks:
        - prometheus
