apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-server
  namespace: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: litellm-server
      annotations:
        configmap.reloader.stakater.com/reload: "litellm-config,litellm-custom-hooks"
    spec:
      containers:
      - name: server
        image: ghcr.io/berriai/litellm:main-stable
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: master-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: database-url
        - name: MCP_TOOL_PREFIX_SEPARATOR
          value: "_"
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        args:
        - --config
        - /app/config.yaml
        - --port
        - '4000'
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: custom-hooks
          mountPath: /app/custom_hooks
          readOnly: true
      - name: owu-model-init
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        env:
        - name: OWU_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: owu-admin-password
        command:
        - python3
        - -c
        - |
          import json, os, sys, time, urllib.request

          BASE = "https://bot.amer.dev"
          EMAIL = "alex@amer.dev"
          MODEL = "qwen3-35b-think"

          def api(url, data=None, token=None):
              h = {"Content-Type": "application/json"}
              if token:
                  h["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(
                  url, data=json.dumps(data).encode() if data is not None else None, headers=h
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          print("Waiting for LiteLLM readiness...")
          while True:
              try:
                  with urllib.request.urlopen("http://localhost:4000/health/readiness", timeout=5) as r:
                      if r.status == 200:
                          break
              except Exception:
                  pass
              time.sleep(5)

          # Allow time for OWU to sync models from LiteLLM
          print("LiteLLM healthy — waiting 45s for OWU model sync...")
          time.sleep(45)

          pw = os.environ.get("OWU_ADMIN_PASSWORD", "")
          try:
              token = api(f"{BASE}/api/v1/auths/signin", {"email": EMAIL, "password": pw})["token"]
              models = api(f"{BASE}/api/v1/models/base", token=token)
              m = next((x for x in models if x.get("id") == MODEL), None)
              if not m:
                  print(f"{MODEL} not found — nothing to do")
              elif m.get("params", {}).get("function_calling") == "native":
                  print(f"{MODEL}: function_calling=native already set")
              else:
                  print(f"{MODEL}: setting function_calling=native")
                  api(f"{BASE}/api/v1/models/model/update", token=token, data={
                      "id": m["id"], "name": m["name"],
                      "meta": m.get("meta", {}),
                      "params": {"function_calling": "native"},
                      "is_active": m.get("is_active", True),
                      "access_grants": m.get("access_grants", []),
                  })
                  print(f"{MODEL}: done")
          except Exception as e:
              print(f"Error: {e}", file=sys.stderr)

          # Stay alive so k8s doesn't restart the pod
          print("Sleeping...")
          while True:
              time.sleep(3600)
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
      - name: custom-hooks
        configMap:
          name: litellm-custom-hooks
