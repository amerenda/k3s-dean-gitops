apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-server
  namespace: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: litellm-server
      annotations:
        configmap.reloader.stakater.com/reload: "litellm-config,litellm-custom-hooks"
    spec:
      nodeSelector:
        kubernetes.io/hostname: murderbot
      containers:
      - name: server
        image: ghcr.io/berriai/litellm:main-stable
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: master-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: database-url
        - name: MCP_TOOL_PREFIX_SEPARATOR
          value: "_"
        startupProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 46
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 4000
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health/liveliness
            port: 4000
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        args:
        - --config
        - /app/config.yaml
        - --port
        - '4000'
        volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: custom-hooks
          mountPath: /app/custom_hooks
          readOnly: true
      volumes:
      - name: litellm-config
        configMap:
          name: litellm-config
      - name: custom-hooks
        configMap:
          name: litellm-custom-hooks
