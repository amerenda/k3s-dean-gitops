apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-custom-hooks
  namespace: litellm
data:
  tool_strip_hook.py: |
    from litellm.integrations.custom_logger import CustomLogger

    _SOFT_TOKEN_BUDGET = 80_000   # below this, skip token-budget stripping
    _HARD_TOKEN_BUDGET = 110_000  # drop full turns if still over after pair-strip
    _CHARS_PER_TOKEN   = 4
    _MIN_KEEP_TURNS    = 6        # always preserve at least this many user turns

    _SYNTHESIS_SIGNAL_AFTER = 30  # inject "stop calling tools" into last tool result
    _FORCE_NO_TOOLS_AFTER   = 50  # strip tools from request entirely after this many


    def _estimate_tokens(msgs):
        chars = sum(
            len(str(m.get("content") or "")) + len(str(m.get("tool_calls") or ""))
            for m in msgs
        )
        return chars // _CHARS_PER_TOKEN


    def _normalize_null_content(msgs):
        """Normalize content=None to content='' in assistant messages.

        When qwen3-35b-think produces only a thinking block (no text, no tool calls),
        it returns content=null. OWU stores this verbatim and sends it back on the next
        turn. llama.cpp rejects it with 400: 'Assistant message must contain either
        content or tool_calls'.
        """
        for msg in msgs:
            if msg.get("role") == "assistant" and msg.get("content") is None:
                msg["content"] = ""


    def _cleanup_orphaned_tool_pairs(msgs):
        """
        Remove malformed tool call groups before they reach llama.cpp.

        llama.cpp returns 400 when the message list contains:
        - tool messages whose tool_call_id has no matching assistant.tool_calls entry
        - assistant messages with tool_calls where at least one result is missing
        - assistant tool_calls with invalid JSON in the arguments field (happens when
          the reasoning budget is exhausted mid-generation, truncating the JSON)

        All cases are removed atomically (always the full group: assistant msg +
        all its tool results) to avoid creating new orphans.

        Returns number of messages removed (0 = message list was already clean).
        """
        import json as _json

        def _has_invalid_args(tc):
            args = (tc.get("function") or {}).get("arguments", "")
            if not args:
                return False
            try:
                _json.loads(args)
                return False
            except Exception:
                return True

        # tool_call_id -> assistant message index (from assistant.tool_calls entries)
        call_to_asst = {}
        for i, m in enumerate(msgs):
            if m.get("role") == "assistant":
                for tc in (m.get("tool_calls") or []):
                    tc_id = tc.get("id")
                    if tc_id:
                        call_to_asst[tc_id] = i

        # tool_call_id -> list of tool result message indices
        call_to_results = {}
        for i, m in enumerate(msgs):
            if m.get("role") == "tool":
                tc_id = m.get("tool_call_id")
                if tc_id:
                    call_to_results.setdefault(tc_id, []).append(i)

        # assistant message index -> list of tool_call_ids it issued
        asst_to_calls = {}
        for tc_id, asst_idx in call_to_asst.items():
            asst_to_calls.setdefault(asst_idx, []).append(tc_id)

        to_remove = set()

        # Orphaned tool results: no matching assistant tool_calls entry
        for tc_id, result_idxs in call_to_results.items():
            if tc_id not in call_to_asst:
                to_remove.update(result_idxs)

        # Incomplete or malformed groups: remove entire group atomically.
        # Triggers if: any result is missing, OR any tool_call has invalid JSON args
        # (truncated by reasoning-budget exhaust mid-generation).
        for asst_idx, tc_ids in asst_to_calls.items():
            asst_tool_calls = (msgs[asst_idx].get("tool_calls") or [])
            has_missing_result = any(tc_id not in call_to_results for tc_id in tc_ids)
            has_bad_args = any(_has_invalid_args(tc) for tc in asst_tool_calls)
            if has_missing_result or has_bad_args:
                to_remove.add(asst_idx)
                for tc_id in tc_ids:
                    to_remove.update(call_to_results.get(tc_id, []))

        if not to_remove:
            return 0

        for i in sorted(to_remove, reverse=True):
            msgs.pop(i)
        return len(to_remove)


    def _cleanup_consecutive_assistant_msgs(msgs):
        """Remove all-but-last consecutive assistant messages.

        llama.cpp returns 400 when two or more assistant messages appear back-to-back.
        This happens when the client appends a text response and then calls again without
        an intervening user message (e.g., a test driver that skips to a synthesis turn).
        Keep only the last assistant message in each consecutive run.
        """
        to_remove = set()
        for i in range(len(msgs) - 1):
            if msgs[i].get("role") == "assistant" and msgs[i + 1].get("role") == "assistant":
                to_remove.add(i)
        if not to_remove:
            return 0
        for i in sorted(to_remove, reverse=True):
            msgs.pop(i)
        return len(to_remove)


    def _inject_synthesis_signal(msgs, tool_count):
        """Prepend a synthesis directive to the last tool result message.

        Prepended (not appended) because the jinja template caps tool response
        content at max_tool_response_chars=3000 — an appended signal would be
        silently truncated if the tool result is already at the limit.
        """
        for i in range(len(msgs) - 1, -1, -1):
            if msgs[i].get("role") == "tool":
                content = msgs[i].get("content") or ""
                if isinstance(content, str) and "[STOP:" not in content:
                    signal = (
                        f"[STOP: {tool_count} tool calls made — sufficient information gathered. "
                        "DO NOT call any more tools. Write your final synthesized answer now.]\n\n"
                    )
                    msgs[i]["content"] = signal + content
                break


    class ToolStripHook(CustomLogger):
        """
        Two-stage context reducer with orphan cleanup, plus synthesis enforcement.

        Stage -1 (synthesis signal, after _SYNTHESIS_SIGNAL_AFTER tool calls):
        Appends a hard stop directive to the last tool result so the model cannot
        reason its way past the system-prompt tool-call limit.

        Stage -1b (force no tools, after _FORCE_NO_TOOLS_AFTER tool calls):
        Strips the tools list from the request so the model physically cannot
        make more tool calls regardless of what it wants to do.

        Stage 0 (always): removes malformed tool call groups that would cause
        llama.cpp to return 400 (orphaned tool_call_ids in either direction).

        Stage 1 (soft, ~80K tokens): strips paired tool exchanges from all
        turns before the last user message — both the assistant tool_calls
        message AND the following tool result. Text responses stay intact.

        Stage 2 (hard, ~110K tokens): if still over budget after stage 1,
        drops the oldest complete turn (user + following messages) until
        under budget or _MIN_KEEP_TURNS is reached.
        """

        async def async_pre_call_hook(self, user_api_key_dict, cache, data, call_type):
            if call_type not in ("completion", "acompletion"):
                return data
            msgs = data.get("messages", [])
            if not msgs:
                return data

            # DEBUG: log any assistant messages with None or missing content
            import sys as _sys
            for _i, _m in enumerate(msgs):
                if _m.get("role") == "assistant":
                    _c = _m.get("content")
                    _tc = _m.get("tool_calls")
                    if _c is None and not _tc:
                        print(f"[tool_strip_hook] WARN msg[{_i}]: content=None, no tool_calls, type={type(_m).__name__}", file=_sys.stderr, flush=True)
                    elif _c is None:
                        print(f"[tool_strip_hook] INFO msg[{_i}]: content=None but has tool_calls", file=_sys.stderr, flush=True)

            # Stage -2: normalise null content in assistant messages (must run first)
            _normalize_null_content(msgs)

            # DEBUG: confirm normalization applied
            for _i, _m in enumerate(msgs):
                if _m.get("role") == "assistant" and _m.get("content") == "":
                    print(f"[tool_strip_hook] FIXED msg[{_i}]: content was None, now ''", file=_sys.stderr, flush=True)

            # Stages -1 and -1b: synthesis enforcement
            tool_msg_count = sum(1 for m in msgs if m.get("role") == "tool")
            if tool_msg_count >= _SYNTHESIS_SIGNAL_AFTER:
                _inject_synthesis_signal(msgs, tool_msg_count)
            if tool_msg_count >= _FORCE_NO_TOOLS_AFTER:
                data.pop("tools", None)
                data.pop("tool_choice", None)

            # Stage 0: always clean malformed sequences (prevents 400 format errors)
            _cleanup_orphaned_tool_pairs(msgs)
            _cleanup_consecutive_assistant_msgs(msgs)

            # Stages 1+2: token-budget stripping (handles context overflow)
            if _estimate_tokens(msgs) < _SOFT_TOKEN_BUDGET:
                return data

            last_user_idx = max(
                (i for i, m in enumerate(msgs) if m.get("role") == "user"),
                default=0
            )

            # Stage 1: strip paired tool exchanges from prior turns
            tool_result_idxs = {
                i for i, m in enumerate(msgs)
                if m.get("role") == "tool" and i <= last_user_idx
            }
            paired_call_idxs = {
                i - 1
                for i in tool_result_idxs
                if i > 0
                and msgs[i - 1].get("role") == "assistant"
                and msgs[i - 1].get("tool_calls")
            }
            msgs = [m for i, m in enumerate(msgs) if i not in (tool_result_idxs | paired_call_idxs)]

            # Stage 2: drop oldest turns if still over hard budget
            while _estimate_tokens(msgs) >= _HARD_TOKEN_BUDGET:
                user_idxs = [i for i, m in enumerate(msgs) if m.get("role") == "user"]
                if len(user_idxs) <= _MIN_KEEP_TURNS:
                    break
                sys_prefix = [m for i, m in enumerate(msgs) if i < user_idxs[0] and m.get("role") == "system"]
                msgs = sys_prefix + msgs[user_idxs[1]:]

            data["messages"] = msgs
            return data


    proxy_handler_instance = ToolStripHook()
