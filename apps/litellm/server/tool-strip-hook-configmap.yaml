apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-custom-hooks
  namespace: litellm
data:
  tool_strip_hook.py: |
    from litellm.integrations.custom_logger import CustomLogger

    class ToolStripHook(CustomLogger):
        """
        Drops raw tool-role messages from all prior turns before sending to
        the model. Keeps all user + assistant messages (synthesized research).
        Prevents context overflow on long sessions without degrading quality.
        """
        async def async_pre_call_hook(self, user_api_key_dict, cache, data, call_type):
            if call_type not in ("completion", "acompletion"):
                return data
            msgs = data.get("messages", [])
            if not msgs:
                return data

            last_user_idx = max(
                (i for i, m in enumerate(msgs) if m.get("role") == "user"),
                default=0
            )

            data["messages"] = [
                m for i, m in enumerate(msgs)
                if m.get("role") != "tool" or i > last_user_idx
            ]
            return data

    proxy_handler_instance = ToolStripHook()
