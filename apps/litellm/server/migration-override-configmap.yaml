apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-migration-override
  namespace: litellm
data:
  prisma_migration.py: |
    # Override of /app/litellm/proxy/prisma_migration.py
    #
    # Startup time breakdown (measured, cold container):
    #   - Python imports 3044 modules (litellm.proxy.proxy_server): ~2-7 min
    #     (varies with overlay FS page cache warmth; unavoidable without custom image)
    #   - subprocess.run(["prisma"]) binary existence check: ~10s (Node.js startup)
    #   - prisma migrate deploy: ~17s
    #   - uvicorn lifespan: ~8s
    #   Total: ~8 minutes observed
    #
    # The original script called run_server(["--skip_server_startup"]) which
    # internally ran `prisma generate` (Node.js), adding ~2 extra minutes.
    # This override skips that, running prisma migrate deploy directly.

    import os
    import subprocess
    import sys

    sys.path.insert(0, os.path.abspath("./"))

    from litellm._logging import verbose_proxy_logger

    verbose_proxy_logger.info("Running prisma migrate deploy")
    result = subprocess.run(
        ["prisma", "migrate", "deploy"],
        capture_output=True, text=True,
        cwd="/app",
    )
    verbose_proxy_logger.info(f"prisma migrate deploy stdout: {result.stdout}")
    if result.returncode != 0:
        verbose_proxy_logger.error(
            f"prisma migrate deploy failed (exit {result.returncode}): {result.stderr}"
        )
        sys.exit(result.returncode)
    verbose_proxy_logger.info("prisma migrate deploy completed")
    verbose_proxy_logger.info("Skipping prisma generate — Prisma client pre-built in image")
