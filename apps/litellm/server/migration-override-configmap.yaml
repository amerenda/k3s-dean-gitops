apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-migration-override
  namespace: litellm
data:
  prisma_migration.py: |
    # Override of /app/litellm/proxy/prisma_migration.py
    #
    # Root cause of slow startup: the original script calls
    # run_server(["--skip_server_startup"]) which internally runs `prisma generate`
    # (Node.js Prisma CLI). On Wolfi Linux, Node.js startup overhead makes this
    # take ~10 minutes per restart. `prisma --version` alone takes 22 seconds.
    #
    # The Prisma Python client is pre-built in the image at:
    #   /app/.venv/lib/python3.13/site-packages/prisma/
    # so prisma generate is redundant and safe to skip.
    #
    # This override runs `prisma migrate deploy` directly (17 seconds) and skips
    # both prisma generate calls, reducing startup from ~10 min to ~30 seconds.

    import os
    import subprocess
    import sys

    sys.path.insert(0, os.path.abspath("./"))

    from litellm._logging import verbose_proxy_logger

    verbose_proxy_logger.info("Running prisma migrate deploy")
    result = subprocess.run(
        ["prisma", "migrate", "deploy"],
        capture_output=True, text=True,
        cwd="/app",
    )
    verbose_proxy_logger.info(f"prisma migrate deploy stdout: {result.stdout}")
    if result.returncode != 0:
        verbose_proxy_logger.error(
            f"prisma migrate deploy failed (exit {result.returncode}): {result.stderr}"
        )
        sys.exit(result.returncode)
    verbose_proxy_logger.info("prisma migrate deploy completed")
    verbose_proxy_logger.info("Skipping prisma generate — Prisma client pre-built in image")
