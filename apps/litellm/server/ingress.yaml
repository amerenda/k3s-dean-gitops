apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm-ingress
  namespace: litellm
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: litellm.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - litellm.amer.dev
      secretName: litellm-amer-dev-tls
  rules:
    - host: litellm.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm-server
                port:
                  number: 4000
