apiVersion: v1
kind: Service
metadata:
  name: calibre-web
  namespace: calibre-web
spec:
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
---
# calibre-web runs on murderbot via Komodo (komodo-dean-gitops
# murderbot/media-server), not in k3s — same pattern as
# infra/ingresses/jellyfin-ingress-amer-dev.yaml's *-external services.
# discovery.k8s.io/v1 EndpointSlice, not the deprecated v1 Endpoints —
# ArgoCD globally excludes v1 Endpoints from sync (resource.exclusions
# in argocd-cm).
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: calibre-web-1
  namespace: calibre-web
  labels:
    kubernetes.io/service-name: calibre-web
addressType: IPv4
endpoints:
  - addresses:
      - 10.100.20.19
    conditions:
      ready: true
ports:
  - name: ""
    port: 8083
    protocol: TCP
