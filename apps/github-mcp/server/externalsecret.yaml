apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-mcp-secrets
  namespace: github-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: github-mcp-secrets
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: github-amerenda-coder-app-id
        property: password
    - secretKey: GITHUB_APP_PRIVATE_KEY
      remoteRef:
        key: github-amerenda-coder-private-key
        property: password
    - secretKey: GITHUB_APP_INSTALLATION_ID
      remoteRef:
        key: github-amerenda-coder-installation-id
        property: password
