apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp-server
  namespace: github-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: github-mcp-server
    spec:
      containers:
        - name: server
          image: amerenda/github-mcp:sha-f380947
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: github-mcp-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
