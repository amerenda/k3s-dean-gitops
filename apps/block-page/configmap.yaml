apiVersion: v1
kind: ConfigMap
metadata:
  name: block-page-content
  namespace: block-page
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Blocked</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #111;
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .card {
          text-align: center;
          padding: 2rem;
        }
        img {
          max-width: 90vw;
          max-height: 70vh;
          border-radius: 12px;
          box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        p {
          color: #888;
          margin-top: 1.5rem;
          font-size: 0.9rem;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <img src="/blocked.jpg" alt="Blocked">
        <p>This site has been blocked.</p>
      </div>
    </body>
    </html>
  nginx.conf: |
    server {
      listen 80 default_server;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
