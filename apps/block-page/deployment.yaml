apiVersion: apps/v1
kind: Deployment
metadata:
  name: block-page
  namespace: block-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: block-page
  template:
    metadata:
      labels:
        app: block-page
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: image
              mountPath: /usr/share/nginx/html/blocked.jpg
              subPath: blocked.jpg
            - name: html
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: html
          configMap:
            name: block-page-content
        - name: image
          configMap:
            name: block-page-image
