apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-manager-frontend-uat-ingress
  namespace: llm-manager
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    external-dns.alpha.kubernetes.io/hostname: llm-manager-uat.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - llm-manager-uat.amer.dev
      secretName: llm-manager-frontend-uat-amer-dev-tls
  rules:
    - host: llm-manager-uat.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-manager-frontend-uat
                port:
                  number: 80
