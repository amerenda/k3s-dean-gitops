apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llm-manager-db-credentials-uat
  namespace: llm-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: llm-manager-db-credentials-uat
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: llm-manager-dean-db-uat-password
        property: password
