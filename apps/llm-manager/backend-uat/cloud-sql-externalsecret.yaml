## cloud-sql-sa-key is already created by backend/cloud-sql-externalsecret.yaml
## in the same namespace — no need to duplicate it here.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloud-sql-postgres-credentials-uat
  namespace: llm-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: cloud-sql-postgres-credentials-uat
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: dean-cloud-sql-llm-uat-password
        property: password
