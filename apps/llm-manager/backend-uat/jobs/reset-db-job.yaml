apiVersion: batch/v1
kind: Job
metadata:
  name: uat-db-reset
  namespace: llm-manager
  labels:
    app: llm-manager-uat-db-reset
  annotations:
    argocd.argoproj.io/hook: Skip
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: murderbot
      tolerations:
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
      restartPolicy: Never
      containers:
        - name: reset
          image: postgres:16-alpine
          command: ["sh", "-c", "echo 'Waiting for cloud-sql-proxy...' && until pg_isready -h 127.0.0.1 -p 5432 -q; do sleep 2; done && echo 'Connected.' && psql -h 127.0.0.1 -p 5432 -U llm_uat -d llm_manager_uat -f /seed/seed.sql && echo 'Done. Stopping proxy...' && wget -qO- http://localhost:9091/quitquitquit || true"]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-sql-postgres-credentials-uat
                  key: postgres-password
          volumeMounts:
            - name: seed-data
              mountPath: /seed
              readOnly: true
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--port=5432"
            - "--quitquitquit"
            - "--http-port=9091"
            - "amerenda-k3s:us-east1:k3s-dean-postgres"
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/sa-key.json
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: seed-data
          configMap:
            name: uat-seed-data
        - name: gcp-sa-key
          secret:
            secretName: cloud-sql-sa-key
