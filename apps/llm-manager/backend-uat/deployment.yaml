apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-manager-backend-uat
  namespace: llm-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-manager-backend-uat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: llm-manager-backend-uat
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: amerenda/llm-manager:backend-sha-4cbbc7f
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-manager-db-credentials-uat
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://llmmanager_uat:$(PGPASSWORD)@10.100.20.18:5432/llmmanager_uat"
            - name: LLM_MANAGER_AGENT_PSK
              valueFrom:
                secretKeyRef:
                  name: agent-psk
                  key: psk
                  optional: true
            - name: LLM_MANAGER_REGISTRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: registration-secret
                  key: secret
                  optional: true
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-id
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-secret
                  optional: true
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secret
                  key: secret
                  optional: true
            - name: GITHUB_ALLOWED_USERS
              value: "amerenda"
            - name: API_KEY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: api-key-encryption-key
                  key: key
                  optional: true
            - name: DISABLE_SCHEDULER
              value: "true"
            - name: DISABLE_AUTH
              value: "true"
            - name: ENVIRONMENT
              value: "uat"
            - name: UAT_TEST_RUNNER
              value: ""  # Set to runner name when always-on model is configured
            - name: UAT_TEST_MODEL
              value: ""  # Set to model name when always-on model is configured
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 1Gi
