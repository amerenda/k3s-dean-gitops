apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-manager-backend-uat
  namespace: llm-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-manager-backend-uat
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: llm-manager-backend-uat
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: amerenda/llm-manager:backend-sha-a1e98e9
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-sql-postgres-credentials-uat
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://llm_uat:$(PGPASSWORD)@127.0.0.1:5432/llm_manager_uat"
            - name: LLM_MANAGER_AGENT_PSK
              valueFrom:
                secretKeyRef:
                  name: agent-psk
                  key: psk
                  optional: true
            - name: LLM_MANAGER_REGISTRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: registration-secret
                  key: secret
                  optional: true
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-id
                  optional: true
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-secret
                  optional: true
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secret
                  key: secret
                  optional: true
            - name: GITHUB_ALLOWED_USERS
              value: "amerenda"
            - name: API_KEY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: api-key-encryption-key
                  key: key
                  optional: true
            - name: DISABLE_SCHEDULER
              value: "true"
            - name: DISABLE_AUTH
              value: "true"
            - name: ENVIRONMENT
              value: "uat"
            - name: UAT_TEST_RUNNER
              value: ""  # Set to runner name when always-on model is configured
            - name: UAT_TEST_MODEL
              value: ""  # Set to model name when always-on model is configured
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--port=5432"
            - "amerenda-k3s:us-east1:k3s-dean-postgres"
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/sa-key.json
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: cloud-sql-sa-key
