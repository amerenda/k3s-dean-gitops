apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-manager-backend
  namespace: llm-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-manager-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: llm-manager-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: amerenda/llm-manager:backend-sha-154011f
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-sql-postgres-credentials
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://llm:$(PGPASSWORD)@127.0.0.1:5432/llmmanager"
            - name: LLM_MANAGER_AGENT_PSK
              valueFrom:
                secretKeyRef:
                  name: agent-psk
                  key: psk
            - name: LLM_MANAGER_REGISTRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: registration-secret
                  key: secret
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-secret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secret
                  key: secret
            - name: GITHUB_ALLOWED_USERS
              value: "amerenda"
            - name: API_KEY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: api-key-encryption-key
                  key: key
            - name: SIMPLIFIED_SCHEDULER
              value: "1"  # one-model-per-GPU scheduler (plans/queue-one-model-per-gpu.md)
            - name: QUEUE_STRATEGY
              value: "priority_batching"  # batch up to N same-model jobs at the head of the queue
            - name: QUEUE_BATCH_SIZE
              value: "5"
            - name: HIGH_PRIORITY_APPS
              value: "mycroft-coordinator,mycroft-coder"  # these apps get priority=1
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--port=5432"
            - "amerenda-k3s:us-east1:k3s-dean-postgres"
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/sa-key.json
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: cloud-sql-sa-key
