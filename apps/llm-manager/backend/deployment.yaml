apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-manager-backend
  namespace: llm-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-manager-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: llm-manager-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: amerenda/llm-manager:backend-sha-4cf9990
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-manager-db-credentials
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://llmmanager:$(PGPASSWORD)@10.100.20.18:5432/llmmanager"
            - name: LLM_MANAGER_AGENT_PSK
              valueFrom:
                secretKeyRef:
                  name: agent-psk
                  key: psk
            - name: LLM_MANAGER_REGISTRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: registration-secret
                  key: secret
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-id
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-oauth
                  key: client-secret
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secret
                  key: secret
            - name: GITHUB_ALLOWED_USERS
              value: "amerenda"
            - name: API_KEY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: api-key-encryption-key
                  key: key
            - name: QUEUE_STRATEGY
              value: "priority_batching"  # batch up to N same-model jobs at the head of the queue
            - name: QUEUE_BATCH_SIZE
              value: "5"
            - name: HIGH_PRIORITY_APPS
              value: "mycroft-coordinator,mycroft-coder"  # these apps get priority=1
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
