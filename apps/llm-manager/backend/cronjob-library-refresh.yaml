apiVersion: batch/v1
kind: CronJob
metadata:
  name: llm-library-refresh
  namespace: llm-manager
spec:
  # Run every 12 hours (twice a day) — low enough to not get blocked by Ollama
  schedule: "0 */12 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: refresh
              image: curlimages/curl:latest
              command: ["sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  echo "Refreshing Ollama library cache..."
                  http_code=$(curl -sS -o /tmp/resp -w "%{http_code}" \
                    -X POST \
                    http://llm-manager-backend.llm-manager.svc.cluster.local:8081/api/library/refresh \
                    -H "Content-Type: application/json")
                  echo "HTTP $http_code"
                  cat /tmp/resp || true
                  echo
                  # Fail the Job on non-200 so Kubernetes shows the failure
                  # instead of silently marking it successful (see
                  # plans/library-refresh-broken.md).
                  test "$http_code" = "200"
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
