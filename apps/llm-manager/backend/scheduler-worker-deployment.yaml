apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-manager-scheduler
  namespace: llm-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-manager-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: llm-manager-scheduler
    spec:
      containers:
        - name: scheduler
          image: amerenda/llm-manager:backend-sha-b2d4d47
          imagePullPolicy: Always
          command: ["python", "-m", "scheduler_worker"]
          ports:
            - containerPort: 8081
          startupProbe:
            httpGet:
              path: /health
              port: 8081
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-manager-db-credentials
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://llmmanager:$(PGPASSWORD)@10.100.20.18:5432/llmmanager"
            - name: SCHEDULER_LEADER_BACKEND
              value: "postgres"
            - name: LLM_MANAGER_AGENT_PSK
              valueFrom:
                secretKeyRef:
                  name: agent-psk
                  key: psk
            - name: QUEUE_STRATEGY
              value: "priority_batching"
            - name: QUEUE_BATCH_SIZE
              value: "5"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 2Gi
