# Leader election for llm-manager-scheduler (coordination.k8s.io Lease).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-manager-scheduler
  namespace: llm-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-manager-scheduler-lease
  namespace: llm-manager
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-manager-scheduler-lease
  namespace: llm-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llm-manager-scheduler-lease
subjects:
  - kind: ServiceAccount
    name: llm-manager-scheduler
    namespace: llm-manager
