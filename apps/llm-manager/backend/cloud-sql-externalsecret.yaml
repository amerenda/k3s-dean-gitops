apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llm-manager-db-credentials
  namespace: llm-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: llm-manager-db-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # BWS stores this secret as JSON {"password":"..."} — extract the inner value.
        postgres-password: '{{ index (index . "postgres-password" | fromJson) "password" }}'
  data:
    - secretKey: postgres-password
      remoteRef:
        key: llm-manager-dean-db-password
