apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-manager-ui-uat
  namespace: llm-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-manager-ui-uat
  template:
    metadata:
      labels:
        app: llm-manager-ui-uat
    spec:
      containers:
        - name: ui
          image: amerenda/llm-manager:ui-sha-a486bae
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: llm-manager-ui-uat-nginx
