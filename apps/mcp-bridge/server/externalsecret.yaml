apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-bridge-secrets
  namespace: mcp-bridge
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secretstore
    kind: ClusterSecretStore
  target:
    name: mcp-bridge-secrets
    creationPolicy: Owner
  data:
    - secretKey: litellm-api-key
      remoteRef:
        key: litellm-master-key
        property: password
