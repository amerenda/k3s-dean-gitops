apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: searxng
data:
  settings.yml: |
    use_default_settings: true

    general:
      instance_name: "Dean Search"
      enable_metrics: false

    search:
      safe_search: 1
      default_lang: "en"
      formats:
        - html
        - json

      # These are the defaults — override per-query via MCP engines param when needed.
      # Keep google+bing for general, stackoverflow+github for code, reddit for community discussions.

    server:
      port: 8080
      bind_address: "0.0.0.0"
      secret_key: "dean-searxng-llm-research-2025"
      limiter: false

    ui:
      static_use_hash: true

    engines:
      - name: google
        engine: google
        shortcut: g
        disabled: false
      - name: bing
        engine: bing
        shortcut: b
        disabled: true
      - name: duckduckgo
        engine: duckduckgo
        shortcut: ddg
        disabled: true
      - name: wikipedia
        engine: wikipedia
        shortcut: wp
        disabled: true
      - name: github
        engine: github
        shortcut: gh
        disabled: false
      - name: arxiv
        engine: arxiv
        shortcut: ax
        disabled: true
      - name: stackoverflow
        engine: stackoverflow
        shortcut: so
        disabled: false
      - name: reddit
        engine: reddit
        shortcut: r
        disabled: true
