apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: mycroft
data:
  settings.yml: |
    use_default_settings: true

    general:
      instance_name: "Mycroft Search"
      enable_metrics: false

    search:
      safe_search: 0
      default_lang: "en"
      formats:
        - html
        - json

    server:
      port: 8080
      bind_address: "0.0.0.0"
      secret_key: "mycroft-searxng-internal"
      limiter: false

    ui:
      static_use_hash: true

    engines:
      - name: google
        engine: google
        shortcut: g
        disabled: false
      - name: bing
        engine: bing
        shortcut: b
        disabled: false
      - name: duckduckgo
        engine: duckduckgo
        shortcut: ddg
        disabled: false
      - name: wikipedia
        engine: wikipedia
        shortcut: wp
        disabled: false
      - name: github
        engine: github
        shortcut: gh
        disabled: false
