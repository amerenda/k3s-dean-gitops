apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: mycroft
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      initContainers:
        - name: copy-config
          image: busybox
          command: ["sh", "-c", "cp /cfg/settings.yml /etc/searxng/settings.yml && chown 977:977 /etc/searxng/settings.yml"]
          volumeMounts:
            - name: searxng-data
              mountPath: /etc/searxng
            - name: config-source
              mountPath: /cfg
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: "http://mycroft-search.mycroft.svc:8080"
            # Override k8s-injected SEARXNG_PORT that breaks granian
            - name: SEARXNG_PORT
              value: ""
          volumeMounts:
            - name: searxng-data
              mountPath: /etc/searxng
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
      volumes:
        - name: searxng-data
          emptyDir: {}
        - name: config-source
          configMap:
            name: searxng-config
