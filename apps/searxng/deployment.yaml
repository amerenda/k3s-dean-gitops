apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      initContainers:
        - name: copy-config
          image: busybox:1.37.0
          command: ["sh", "-c", "cp /cfg/settings.yml /etc/searxng/settings.yml && chown 977:977 /etc/searxng/settings.yml"]
          volumeMounts:
            - name: searxng-data
              mountPath: /etc/searxng
            - name: config-source
              mountPath: /cfg
      containers:
        - name: searxng
          image: searxng/searxng:2025.6.1-d3a9ea4b4
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: "https://searxng.amer.dev"
            # Override k8s-injected SEARXNG_PORT that conflicts with granian's startup
            - name: SEARXNG_PORT
              value: ""
          volumeMounts:
            - name: searxng-data
              mountPath: /etc/searxng
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
      volumes:
        - name: searxng-data
          emptyDir: {}
        - name: config-source
          configMap:
            name: searxng-config
