apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: openwebui
spec:
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: openwebui
  namespace: openwebui
subsets:
  - addresses:
      - ip: 10.100.20.18
    ports:
      - port: 3000
