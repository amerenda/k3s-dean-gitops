apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: schoolmode-ingress
  namespace: schoolmode
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: schoolmode-tailscale-only@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: schoolmode.amer.dev
    external-dns.alpha.kubernetes.io/ttl: "300"
spec:
  ingressClassName: infra-traefik
  tls:
    - hosts:
        - schoolmode.amer.dev
      secretName: schoolmode-amer-dev-tls
  rules:
    - host: schoolmode.amer.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: schoolmode
                port:
                  number: 80
