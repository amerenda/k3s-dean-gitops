apiVersion: v1
kind: Secret
metadata:
  name: repo-k3s-dean-gitops
  namespace: default
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/amerenda/k3s-dean-gitops.git
  # GitHub PAT with repo read access — required because GitHub HTTPS
  # blocks git fetch by SHA without authentication, which breaks
  # ArgoCD's GetRevisionMetadata calls.
  username: amerenda
  password: "ghp_REPLACE_WITH_GITOPS_PAT"
